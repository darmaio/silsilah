<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00e5ff">
    <meta name="apple-mobile-web-app-status-bar-style" content="#00e5ff">
    <title>Silsilah Keluarga Mbah Muntari</title>
    <script src="config.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: sans-serif; }

        /* Jaring Pengaman Grid 3 Kolom */
        .grid.grid-cols-3 {
            display: grid !important;
            grid-template-columns: repeat(3, 1fr) !important;
            gap: 12px !important;
        }

        /* Grid Menu */
        .menu-card {
            background: white;
            border-radius: 15px;
            padding: 12px 5px !important;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #eee;
            transition: transform 0.2s;
            cursor: pointer; /* Agar muncul kursor tangan saat di desktop */
            -webkit-tap-highlight-color: transparent; /* Menghilangkan kotak biru saat di-tap di HP */
            -webkit-font-smoothing: antialiased;
        }
        /* INI CSS PENGGANTI TAILWIND UNTUK BARIS HIDUP/WAFAT */
        .status-row {
            display: flex !important;
            flex-direction: row !important;
            align-items: center !important;
            justify-content: center !important; /* Paksa semua kumpul di tengah */
            gap: 4px !important; /* Jarak antar 78, pemisah |, dan 29 sama rata */
            margin-top: 4px;
            width: 100%;
            font-size: 10px !important; /* Sedikit diperbesar biar jelas */
            font-weight: 800 !important;
            white-space: nowrap;
        }

        /* ITEM STATUS (Angka & Titik) */
        .status-item {
            display: flex !important;
            align-items: center !important;
            gap: 3px !important; /* Jarak antara titik warna dan angkanya */
        }

        /* PEMISAH VERTIKAL */
        .status-divider {
            color: #d1d5db;
            margin: 0 1px; /* Jarak super tipis agar simetris */
            opacity: 0.6;
        }

        /* TITIK WARNA */
        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0; /* Biar titik tidak gepeng kalau ruang sempit */
        }
        
        /* Lengkungan Header Tosca */
        .header-curve {
            background: linear-gradient(135deg, #00e5ff 0%, #00acc1 100%);
            height: 90px;
            border-bottom-left-radius: 10% 30px;
            border-bottom-right-radius: 10% 30px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        /* Gaya untuk angka notifikasi merah di pojok kartu */
        .badge-notif {
            position: absolute;
            top: -10px;
            right: -10px;
            background-color: #ff3d00;
            color: white;
            font-size: 12px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }
        .relative-card { position: relative; }

        /* --- LOGIKA REFLEKSI MEWAH --- */
        /* 3. Dekatkan Pagination ke kartu karena refleksinya sudah tipis */
        .wadah-refleksi {
            position: relative;
            padding-bottom: 15px; /* Jarak bawah dipersempit */
        }

        /* Terapkan refleksi pada Swiper Container */
        .mySwiper {
            /* 1. KUNCI TINGGI REFLEKSI DI SINI */
            -webkit-box-reflect: below 2px -webkit-gradient(
                linear, 
                left top, 
                left bottom, 
                from(transparent), 
                /* Di 15% tinggi asli, refleksi mulai hilang */
                color-stop(15%, rgba(255, 255, 255, 0.1)), 
                /* Di 25% tinggi asli, refleksi sudah mati total (transparan) */
                color-stop(25%, transparent), 
                to(transparent)
            );
            
            overflow: visible !important;
        }

        /* Warna titik navigasi saat aktif */
        .swiper-pagination-bullet-active {
            background: #00e5ff !important;
        }

        /* Jarak agar konten di bawah slider tidak tertabrak */
        /* Jaring pengaman Swiper agar Shadow Kartu tidak terpotong */
        /* 2. Karena refleksi sudah pendek, jaring pengamannya cukup 80px saja */
        .swiper {
            clip-path: inset(-100px -100px -80px -100px); 
        }

        .swiper-pagination {
            position: relative !important;
            bottom: -15px !important; /* Angkat sedikit mendekat ke refleksi */
            margin-top: 5px;
        }

        .swiper-wrapper {
            /* Menggunakan cubic-bezier agar gerakan 'sedotan' mulainya lembut dan berhenti lembut */
            transition-timing-function: cubic-bezier(0.25, 1, 0.5, 1) !important;
        }

        .swiper-slide {
            /* Memaksa GPU HP ikut kerja biar geseran super smooth */
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
            will-change: transform;
            
            /* Tambahan: Agar gambar di dalam slide tidak pecah/blur saat animasi */
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            -webkit-perspective: 1000;
            perspective: 1000;
        }

        /* Pastikan gambar di dalam slide mengikuti lekukan kartu */
        .swiper-slide img {
            display: block;
            width: 100%;
        }
        
        .menu-card:active { transform: scale(0.95); }
        .menu-icon { font-size: 24px; margin-bottom: 8px; color: #00b8d4; }
        .menu-label { font-size: 11px; font-weight: 600; color: #555; line-height: 1.2; }
        .menu-value { font-size: 14px; font-weight: bold; color: #333; margin-top: 2px; }
    </style>
</head>
<body>

    <div class="header-curve">
        <h1 class="text-xl font-bold mt-4">Beranda</h1>
    </div>

    <div class="px-6">
        <h3 class="text-lg font-bold my-4">Silsilah Bani Muntari</h2>
        
        <div id="menu-utama" class="grid grid-cols-3 gap-3">
            
            <div class="menu-card" onclick="window.location.href='kenangan.html'">
                <span class="menu-icon">👥</span>
                <span class="menu-label">Jumlah Anggota</span>
                <span class="menu-value" id="angkaJumlah">0</span>
                
                <div class="status-row">
                    <div class="status-item">
                        <span class="dot" style="background-color: #16a34a;"></span>
                        <span id="jumlahHidup" style="color: #15803d;">0</span>
                    </div>
                    
                    <span class="status-divider">|</span>
                    
                    <div class="status-item">
                        <span class="dot" style="background-color: #dc2626;"></span>
                        <span id="jumlahWafat" style="color: #991b1b;">0</span>
                    </div>
                </div>
            </div>

            <div class="menu-card" onclick="window.location.href='statistik.html'">
                <span class="menu-icon">🌿</span>
                <span class="menu-label">Jumlah Generasi</span>
                <span class="menu-value" id="angkaTotalGenerasi">0</span>
            </div>

            <div class="menu-card">
                <span class="menu-icon">📅</span>
                <span class="menu-label">Acara Terdekat</span>
                <span class="menu-value">0</span>
            </div>

            <div class="menu-card">
                <span class="menu-icon">🗓️</span>
                <span class="menu-label">Acara Keluarga</span>
            </div>
            <div class="menu-card" onclick="window.location.href='tambah-anggota.html'">
                <span class="menu-icon">➕</span>
                <span class="menu-label">Tambah Anggota</span>
            </div>
            <div class="menu-card" onclick="window.location.href='cari-anggota.html'">
                <span class="menu-icon">🔍</span>
                <span class="menu-label">Cari Anggota</span>
            </div>

            <div id="menu-kabar" class="menu-card relative-card" onclick="tandaiSudahDilihat('iklan'); window.location.href='kirim-kabar.html'">
                <span class="menu-icon">📣</span>
                <span class="menu-label">Kirim Kabar & Promo</span>
            </div>
            
            <div id="menu-silsilah" class="menu-card relative-card" onclick="tandaiSudahDilihat('keluarga'); window.location.href='pohon-silsilah.html'">
                <span class="menu-icon">🌳</span>
                <span class="menu-label">Lihat Silsilah</span>
            </div>

            <div class="menu-card">
                <span class="menu-icon">🏠</span>
                <span class="menu-label">Ruang Keluarga</span>
            </div>
        </div>

        <div class="mt-8 mb-16 px-6"> <div class="flex justify-between items-center mb-4 px-1">
                <h3 class="font-black text-gray-800 text-sm uppercase tracking-wider">Kabar & Promo</h3>
                <span class="bg-tosca/10 text-toscaDark text-[9px] font-bold px-2 py-0.5 rounded-full">TERBARU</span>
            </div>

            <div class="wadah-refleksi">
                <div class="swiper mySwiper w-full !overflow-visible">
                    <div id="containerIklanCloud" class="swiper-wrapper">
                        </div>
                </div>
            </div>
            
            <div class="swiper-pagination !-bottom-12"></div>
        </div>
    </div>
    
    <script>
        
        // MODIFIKASI DISINI: Variabel untuk menyimpan instance swiper
        let swiperInstance;

        // MODIFIKASI DISINI: Fungsi inisialisasi tunggal dengan spek 'smooth' yang Om mau
        function inisialisasiSwiper() {
            // Hancurkan swiper lama jika sudah ada (biar tidak tumpuk/lag)
            if (swiperInstance) swiperInstance.destroy(true, true);

            swiperInstance = new Swiper(".mySwiper", {
                slidesPerView: 1,
                spaceBetween: 10,
                loop: true,
                speed: 1200,
                followFinger: true,
                threshold: 10,
                touchMoveStopPropagation: true,
                longSwipes: true,
                longSwipesRatio: 0.5,
                longSwipesMs: 300,
                shortSwipes: false,
                touchRatio: 0.8,
                touchReleaseOnEdges: true,
                resistance: true,
                resistanceRatio: 0.3,
                autoplay: {
                    delay: 5000,
                    disableOnInteraction: false,
                },
                pagination: {
                    el: ".swiper-pagination",
                    clickable: true,
                },
            });
        }

        async function cekNotifikasiBaru(dataTerbaru) {
            if (!dataTerbaru || !dataTerbaru.keluarga || !dataTerbaru.iklan) return;
            // 1. Ambil jumlah data lama yang tersimpan di HP
            const jumlahLama = JSON.parse(localStorage.getItem('last_count')) || { keluarga: 0, iklan: 0 };
            
            // 2. Hitung jumlah data baru dari Cloud
            const jumlahKeluargaBaru = dataTerbaru.keluarga.length - jumlahLama.keluarga;
            const jumlahIklanBaru = dataTerbaru.iklan.length - jumlahLama.iklan;

            // 3. Jika ada penambahan, tampilkan Badge atau Pesan
            if (jumlahKeluargaBaru > 0 || jumlahIklanBaru > 0) {
                tampilkanBadge(jumlahKeluargaBaru, jumlahIklanBaru);
                tampilkanPesanSelamatDatang(jumlahKeluargaBaru, jumlahIklanBaru);
            }
        }

        function tampilkanBadge(kel, ikl) {
            if (kel > 0) {
                const menuSilsilah = document.getElementById('menu-silsilah');
                // Cek dulu apakah elemennya ada sebelum diisi innerHTML
                if (menuSilsilah) {
                    menuSilsilah.innerHTML += `<span class="badge-notif">${kel}</span>`;
                }
            }
            if (ikl > 0) {
                // Cari menu kabar, kalau tidak ada, jangan dipaksa
                const menuKabar = document.getElementById('menu-kabar'); 
                if (menuKabar) {
                    menuKabar.innerHTML += `<span class="badge-notif">${ikl}</span>`;
                }
            }
        }

        function tampilkanPesanSelamatDatang(kel, ikl) {
            const toast = document.createElement('div');
            
            // POSISI: 1/5 Atas (top-[10%]), BG Putih, Border Kotak Sedikit Rounded, Teks Abu Gelap
            toast.className = "fixed top-[10%] left-1/2 -translate-x-1/2 bg-white/95 text-gray-700 px-6 py-4 rounded-xl text-sm z-[9999] shadow-[0_10px_25px_-5px_rgba(0,0,0,0.5)] border border-gray-100 flex items-center gap-3 min-w-[280px] backdrop-blur-sm";
            
            // Tambahkan sedikit ikon di depan teks agar lebih manis
            let pesan = "👋 Hai! ";
            if (kel > 0) pesan += `<br><b>${kel}</b> Anggota Baru ditambahkan.`;
            if (ikl > 0) pesan += `<br><b>${ikl}</b> Kabar/Iklan Baru tersedia.`;
            
            toast.innerHTML = `
                <div class="w-1 h-8 bg-[#00e5ff] rounded-full"></div>
                <div class="flex-1">${pesan}</div>
            `;
            
            document.body.appendChild(toast);

            // Animasi masuk (Opsional: Tambahkan di CSS)
            toast.style.animation = "slideDown 0.5s ease-out";

            setTimeout(() => {
                toast.style.opacity = "0";
                toast.style.transition = "opacity 0.5s ease";
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }

        // Panggil ini SETELAH user mengklik menu atau melihat data agar notif hilang
        function tandaiSudahDilihat(dataTerbaru) {
            const counts = {
                keluarga: dataTerbaru.keluarga.length,
                iklan: dataTerbaru.iklan.length
            };
            localStorage.setItem('last_count', JSON.stringify(counts));
        }

       async function perbaruiDashboard() {
            const elJumlah = document.getElementById('angkaJumlah');
            const elGen = document.getElementById('angkaTotalGenerasi');
            const containerIklan = document.getElementById('containerIklanCloud');
            const elHidup = document.getElementById('jumlahHidup');
            const elWafat = document.getElementById('jumlahWafat');

            const hitungStatus = (data) => {
                if (!data || !Array.isArray(data)) return { total: 0, hidup: 0, wafat: 0 };
                let hidup = 0, wafat = 0;
                data.forEach(a => {
                    const nama = (a.nama || "").toLowerCase();
                    const isAlm = nama.includes("(alm.)") || nama.includes("(almh.)");
                    const statusMeninggal = a.status === "Meninggal" || a.status === "Wafat";
                    if (isAlm || statusMeninggal) { wafat++; } else { hidup++; }
                });
                return { total: data.length, hidup, wafat };
            };

            // 1. Load dari LocalStorage dulu
            const dataLokalRaw = localStorage.getItem('dataCloud');
            const dataLokal = dataLokalRaw ? JSON.parse(dataLokalRaw) : { keluarga: [], iklan: [] };
            
            if (dataLokal.keluarga && dataLokal.keluarga.length > 0) {
                const statsLokal = hitungStatus(dataLokal.keluarga);
                if (elJumlah) elJumlah.innerText = statsLokal.total;
                if (elHidup) elHidup.innerText = statsLokal.hidup;
                if (elWafat) elWafat.innerText = statsLokal.wafat;
                if (elGen) updateAngkaGenerasi(dataLokal.keluarga, elGen);
                if (containerIklan) renderIklan(dataLokal.iklan || [], containerIklan);
            }

            // 2. Tarik Data dari Cloud
            try {
                const response = await fetch(URL_API + "?t=" + Date.now());
                const resJson = await response.json();
                
                if (!resJson || !resJson.keluarga) {
                    console.warn("Data cloud kosong atau tidak valid.");
                    return; 
                }

                // Jalankan notifikasi dengan try-catch agar jika ID menu tidak ada, dashboard tetap update
                try {
                    cekNotifikasiBaru(resJson); 
                } catch (e) {
                    console.warn("Gagal menampilkan notifikasi (ID menu mungkin tidak ditemukan)");
                }

                localStorage.setItem('dataCloud', JSON.stringify(resJson));
                
                const statsCloud = hitungStatus(resJson.keluarga);
                if (elJumlah) elJumlah.innerText = statsCloud.total;
                if (elHidup) elHidup.innerText = statsCloud.hidup;
                if (elWafat) elWafat.innerText = statsCloud.wafat;
                if (elGen) updateAngkaGenerasi(resJson.keluarga, elGen);
                if (containerIklan) renderIklan(resJson.iklan || [], containerIklan);

            } catch (err) {
                console.error("Gagal sinkronisasi cloud:", err);
            }
        }

        // Modifikasi fungsi tandaiSudahDilihat agar lebih cerdas
        function tandaiSudahDilihat(tipe) {
            const dataCloud = JSON.parse(localStorage.getItem('dataCloud'));
            let lastCount = JSON.parse(localStorage.getItem('last_count')) || { keluarga: 0, iklan: 0 };
            
            if (dataCloud) {
                if (tipe === 'keluarga') lastCount.keluarga = dataCloud.keluarga.length;
                if (tipe === 'iklan') lastCount.iklan = dataCloud.iklan.length;
                localStorage.setItem('last_count', JSON.stringify(lastCount));
            }
        }

        function renderIklan(daftar, container) {
            const iklanAktif = daftar.filter(item => item.status === "Aktif");
            
            if (!iklanAktif || iklanAktif.length === 0) {
                container.innerHTML = `
                    <div class="swiper-slide bg-white rounded-[15px] p-10 text-center shadow-sm">
                        <p class="text-gray-400 text-[10px] italic">Belum ada promo saat ini.</p>
                    </div>`;
                return;
            }

            const dataUrut = [...iklanAktif].reverse();
            let html = '';

            dataUrut.forEach(item => {
                const linkTujuan = item.link ? item.link : "javascript:void(0)";
                
                html += `
                <div class="swiper-slide"> 
                    <a href="${linkTujuan}" target="${item.link ? '_blank' : '_self'}" 
                    class="relative block w-full h-52 rounded-[15px] overflow-hidden shadow-lg active:scale-[0.98] transition-all duration-300">
                        
                        <img src="${item.gambar}" class="absolute inset-0 w-full h-full object-cover" alt="Kabar">
                        
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>

                        <div class="absolute bottom-0 left-0 right-0 p-4">
                            <h4 class="font-bold text-white text-[13px] leading-tight mb-1 drop-shadow-md">${item.judul}</h4>
                            <p class="text-[10px] text-gray-200 line-clamp-1 font-medium drop-shadow-sm">${item.deskripsi}</p>
                        </div>

                        ${item.link ? '<div class="absolute top-2 right-2 bg-green-500 text-white text-[8px] font-bold px-2 py-1 rounded-lg shadow-lg">PROMO</div>' : ''}
                    </a>
                </div>`;
            });
            
            container.innerHTML = html;
            
            setTimeout(() => {
                inisialisasiSwiper();
            }, 200);
        }

        function updateAngkaGenerasi(data, elemen) {
            if (!data || data.length === 0 || !elemen) return;
            let setGenerasi = new Set();
            data.forEach(a => {
                if (a.tanggalLahir) {
                    const match = a.tanggalLahir.toString().match(/\d{4}/);
                    if (match) {
                        const tahun = parseInt(match[0]);
                        if (tahun >= 2013) setGenerasi.add("Alpha");
                        else if (tahun >= 1997) setGenerasi.add("Z");
                        else if (tahun >= 1981) setGenerasi.add("Milenial");
                        else if (tahun >= 1965) setGenerasi.add("X");
                        else if (tahun >= 1946) setGenerasi.add("Boomers");
                    }
                }
            });
            elemen.innerText = setGenerasi.size;
        }

        // Eksekusi utama
        // Ganti bagian eksekusi utama Om:
        document.addEventListener('DOMContentLoaded', async () => {
            // 1. Jalankan dashboard dari cache lokal dulu agar tidak kosong
            await perbaruiDashboard(); 
            
            // 2. Jika sw.js bermasalah, kita pastikan fetch cloud tetap jalan
            console.log("Sinkronisasi data sedang berlangsung...");
        });
    </script>

</body>
</html>
