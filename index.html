<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00e5ff">
    <meta name="apple-mobile-web-app-status-bar-style" content="#00e5ff">
    <title>Silsilah Keluarga Mbah Muntari</title>
    <script src="config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: sans-serif; }
        
        /* Lengkungan Header Tosca */
        .header-curve {
            background-color: #00e5ff;
            height: 90px;
            border-bottom-left-radius: 10% 30px;
            border-bottom-right-radius: 10% 30px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        /* Grid Menu */
        .menu-card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #eee;
            transition: transform 0.2s;
            cursor: pointer; /* Agar muncul kursor tangan saat di desktop */
            -webkit-tap-highlight-color: transparent; /* Menghilangkan kotak biru saat di-tap di HP */
        }

        /* Gaya untuk angka notifikasi merah di pojok kartu */
        .badge-notif {
            position: absolute;
            top: -10px;
            right: -10px;
            background-color: #ff3d00;
            color: white;
            font-size: 12px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }
        .relative-card { position: relative; }

        /* Warna titik navigasi saat aktif */
        .swiper-pagination-bullet-active {
            background: #00e5ff !important;
        }

        /* Jarak agar konten di bawah slider tidak tertabrak */
        .swiper {
            margin-bottom: 30px;
            padding-bottom: 30px !important;
        }

        .swiper-pagination {
            bottom: 5px !important; /* Menggeser titik ke area padding yang kita buat tadi */
        }

        .swiper-wrapper {
            /* Menggunakan cubic-bezier agar gerakan 'sedotan' mulainya lembut dan berhenti lembut */
            transition-timing-function: cubic-bezier(0.25, 1, 0.5, 1) !important;
        }

        .swiper-slide {
            /* Memaksa GPU HP ikut kerja biar geseran super smooth */
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
            will-change: transform;
            
            /* Tambahan: Agar gambar di dalam slide tidak pecah/blur saat animasi */
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            -webkit-perspective: 1000;
            perspective: 1000;
        }

        /* Pastikan gambar di dalam slide mengikuti lekukan kartu */
        .swiper-slide img {
            display: block;
            width: 100%;
        }
        
        .menu-card:active { transform: scale(0.95); }
        .menu-icon { font-size: 24px; margin-bottom: 8px; color: #00b8d4; }
        .menu-label { font-size: 11px; font-weight: 600; color: #555; line-height: 1.2; }
        .menu-value { font-size: 14px; font-weight: bold; color: #333; margin-top: 2px; }
    </style>
</head>
<body>

    <div class="header-curve">
        <h1 class="text-xl font-bold mt-4">Beranda</h1>
    </div>

    <div class="px-6">
        <h2 class="text-lg font-bold my-4">Silsilah Bani Muntari</h2>
            <div class="grid grid-cols-3 gap-3">
        </div>

        <div class="grid grid-cols-3 gap-3">
            <div class="menu-card" onclick="window.location.href='kenangan.html'">
                <span class="menu-icon">👥</span>
                <span class="menu-label">Jumlah Anggota</span>
                <span class="menu-value" id="angkaJumlah">0</span>

                <div class="flex items-center gap-2 mt-1 text-[10px] font-bold">
                <div class="flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-green-800"></span>
                    <span id="jumlahHidup" class="text-green-900">0</span>
                </div>
                <div class="text-gray-300">|</div>
                <div class="flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-red-800"></span>
                    <span id="jumlahWafat" class="text-red-900">0</span>
                </div>
            </div>
            </div>
            <div class="menu-card" onclick="window.location.href='statistik.html'">
                <span class="menu-icon">🌿</span>
                <span class="menu-label">Jumlah Generasi</span>
                <span class="menu-value" id="angkaTotalGenerasi">0</span>
            </div>
            <div class="menu-card">
                <span class="menu-icon">📅</span>
                <span class="menu-label">Acara Terdekat</span>
                <span class="menu-value">0</span>
            </div>

            <div class="menu-card">
                <span class="menu-icon">🗓️</span>
                <span class="menu-label">Acara Keluarga</span>
            </div>
            <div class="menu-card" onclick="window.location.href='tambah-anggota.html'">
                <span class="menu-icon">➕</span>
                <span class="menu-label">Tambah Anggota</span>
            </div>
            <div class="menu-card" onclick="window.location.href='cari-anggota.html'">
                <span class="menu-icon">🔍</span>
                <span class="menu-label">Cari Anggota</span>
            </div>

            <div class="menu-card" onclick="window.location.href='kirim-kabar.html'">
                <span class="menu-icon">📣</span>
                <span class="menu-label">Kirim Kabar & Promo</span>
            </div>
            <div id="menu-silsilah" class="menu-card relative-card bg-white p-4 rounded-2xl shadow-md" onclick="tandaiSudahDilihat('keluarga'); window.location.href='pohon-silsilah.html'">
                <span class="menu-icon">🌳</span>
                <span class="menu-label">Lihat Silsilah</span>
            </div>
            <div class="menu-card">
                <span class="menu-icon">🏠</span>
                <span class="menu-label">Ruang Keluarga</span>
            </div>
        </div>

        <div class="mt-8 mb-10">
            <h3 class="font-bold text-gray-800 mb-4 px-1">Kabar Terbaru & Promo</h3>
            <div class="swiper mySwiper w-full h-auto rounded-2xl shadow-lg border border-gray-100 overflow-hidden">
                <div id="containerIklanCloud" class="swiper-wrapper">
                    <div class="swiper-slide bg-gray-100 p-10 text-center text-xs text-gray-400">
                        Memuat kabar terbaru...
                    </div>
                </div>
                <div class="swiper-pagination"></div>
            </div>
        </div>
    </div>
    
    <script>
        
        // MODIFIKASI DISINI: Variabel untuk menyimpan instance swiper
        let swiperInstance;

        // MODIFIKASI DISINI: Fungsi inisialisasi tunggal dengan spek 'smooth' yang Om mau
        function inisialisasiSwiper() {
            // Hancurkan swiper lama jika sudah ada (biar tidak tumpuk/lag)
            if (swiperInstance) swiperInstance.destroy(true, true);

            swiperInstance = new Swiper(".mySwiper", {
                slidesPerView: 1,
                spaceBetween: 10,
                loop: true,
                speed: 1200,
                followFinger: true,
                threshold: 10,
                touchMoveStopPropagation: true,
                longSwipes: true,
                longSwipesRatio: 0.5,
                longSwipesMs: 300,
                shortSwipes: false,
                touchRatio: 0.8,
                touchReleaseOnEdges: true,
                resistance: true,
                resistanceRatio: 0.3,
                autoplay: {
                    delay: 5000,
                    disableOnInteraction: false,
                },
                pagination: {
                    el: ".swiper-pagination",
                    clickable: true,
                },
            });
        }

        async function cekNotifikasiBaru(dataTerbaru) {
            // 1. Ambil jumlah data lama yang tersimpan di HP
            const jumlahLama = JSON.parse(localStorage.getItem('last_count')) || { keluarga: 0, iklan: 0 };
            
            // 2. Hitung jumlah data baru dari Cloud
            const jumlahKeluargaBaru = dataTerbaru.keluarga.length - jumlahLama.keluarga;
            const jumlahIklanBaru = dataTerbaru.iklan.length - jumlahLama.iklan;

            // 3. Jika ada penambahan, tampilkan Badge atau Pesan
            if (jumlahKeluargaBaru > 0 || jumlahIklanBaru > 0) {
                tampilkanBadge(jumlahKeluargaBaru, jumlahIklanBaru);
                tampilkanPesanSelamatDatang(jumlahKeluargaBaru, jumlahIklanBaru);
            }
        }

        function tampilkanBadge(kel, ikl) {
            if (kel > 0) {
                const menuSilsilah = document.getElementById('menu-silsilah'); // Pastikan ID ini ada di HTML kartu
                menuSilsilah.innerHTML += `<span class="badge-notif">${kel}</span>`;
            }
            if (ikl > 0) {
                const menuKabar = document.getElementById('menu-kabar'); // Pastikan ID ini ada di HTML kartu
                menuKabar.innerHTML += `<span class="badge-notif">${ikl}</span>`;
            }
        }

        function tampilkanPesanSelamatDatang(kel, ikl) {
            // Membuat pesan pop-up sederhana di bawah layar
            const toast = document.createElement('div');
            toast.className = "fixed bottom-20 left-1/2 -translate-x-1/2 bg-black/80 text-white px-6 py-3 rounded-full text-sm z-50 shadow-2xl border border-[#00e5ff]";
            
            let pesan = "Halo Om! ";
            if (kel > 0) pesan += `${kel} Anggota Baru ditambahkan. `;
            if (ikl > 0) pesan += `${ikl} Kabar/Iklan Baru.`;
            
            toast.innerText = pesan;
            document.body.appendChild(toast);

            // Hilang otomatis setelah 5 detik
            setTimeout(() => toast.remove(), 5000);
        }

        // Panggil ini SETELAH user mengklik menu atau melihat data agar notif hilang
        function tandaiSudahDilihat(dataTerbaru) {
            const counts = {
                keluarga: dataTerbaru.keluarga.length,
                iklan: dataTerbaru.iklan.length
            };
            localStorage.setItem('last_count', JSON.stringify(counts));
        }

       async function perbaruiDashboard() {
            const elJumlah = document.getElementById('angkaJumlah');
            const elGen = document.getElementById('angkaTotalGenerasi');
            const containerIklan = document.getElementById('containerIklanCloud');
            const elHidup = document.getElementById('jumlahHidup');
            const elWafat = document.getElementById('jumlahWafat');

            // Fungsi hitung dengan pengaman (Optional Chaining)
            const hitungStatus = (data) => {
                if (!data || !Array.isArray(data)) return { total: 0, hidup: 0, wafat: 0 };
                
                let hidup = 0;
                let wafat = 0;
                data.forEach(a => {
                    const nama = (a.nama || "").toLowerCase();
                    const isAlm = nama.includes("(alm.)") || nama.includes("(almh.)");
                    const statusMeninggal = a.status === "Meninggal" || a.status === "Wafat";
                    if (isAlm || statusMeninggal) { wafat++; } else { hidup++; }
                });
                return { total: data.length, hidup, wafat };
            };

            // 1. Tampilkan dari Cache Lokal (Agar Langsung Muncul)
            const dataLokalRaw = localStorage.getItem('dataCloud');
            const dataLokal = dataLokalRaw ? JSON.parse(dataLokalRaw) : { keluarga: [], iklan: [] };
            
            if (dataLokal.keluarga && dataLokal.keluarga.length > 0) {
                const statsLokal = hitungStatus(dataLokal.keluarga);
                if (elJumlah) elJumlah.innerText = statsLokal.total;
                if (elHidup) elHidup.innerText = statsLokal.hidup;
                if (elWafat) elWafat.innerText = statsLokal.wafat;
                
                updateAngkaGenerasi(dataLokal.keluarga, elGen);
                renderIklan(dataLokal.iklan || [], containerIklan);
            }

            // 2. Tarik Data Baru dari Cloud
            try {
                // Gunakan parameter ?t= agar tidak kena cache browser
                const response = await fetch(URL_API + "?t=" + Date.now());
                const resJson = await response.json();
                
                // VALIDASI KRITIKAL: Pastikan properti 'keluarga' ada
                if (!resJson || !resJson.keluarga) {
                    console.warn("Format data dari Cloud tidak sesuai (keluarga tidak ditemukan).");
                    return; 
                }

                cekNotifikasiBaru(resJson); 
                localStorage.setItem('dataCloud', JSON.stringify(resJson));
                
                const statsCloud = hitungStatus(resJson.keluarga);
                if (elJumlah) elJumlah.innerText = statsCloud.total;
                if (elHidup) elHidup.innerText = statsCloud.hidup;
                if (elWafat) elWafat.innerText = statsCloud.wafat;

                updateAngkaGenerasi(resJson.keluarga, elGen);
                renderIklan(resJson.iklan || [], containerIklan);

            } catch (err) {
                console.error("Gagal sinkronisasi cloud:", err);
                // Jika gagal, set angka jadi 0 jika di cache memang kosong
                if (!dataLokalRaw && elJumlah) elJumlah.innerText = "0";
            }
        }

        // Modifikasi fungsi tandaiSudahDilihat agar lebih cerdas
        function tandaiSudahDilihat(tipe) {
            const dataCloud = JSON.parse(localStorage.getItem('dataCloud'));
            let lastCount = JSON.parse(localStorage.getItem('last_count')) || { keluarga: 0, iklan: 0 };
            
            if (dataCloud) {
                if (tipe === 'keluarga') lastCount.keluarga = dataCloud.keluarga.length;
                if (tipe === 'iklan') lastCount.iklan = dataCloud.iklan.length;
                localStorage.setItem('last_count', JSON.stringify(lastCount));
            }
        }

        function renderIklan(daftar, container) {
            const iklanAktif = daftar.filter(item => item.status === "Aktif");
            
            if (!iklanAktif || iklanAktif.length === 0) {
                container.innerHTML = '<div class="swiper-slide p-10 text-center text-gray-400 text-xs">Belum ada kabar terbaru yang aktif.</div>';
                return;
            }

            let html = '';
            iklanAktif.forEach(item => {
                const bukaTag = item.link ? `<a href="${item.link}" target="_blank" class="block w-full h-full">` : `<div class="block w-full h-full">`;
                const tutupTag = item.link ? `</a>` : `</div>`;
                const pesanWA = item.link ? `<p class="text-[10px] text-cyan-500 font-bold mt-1">Klik untuk hubungi via WA →</p>` : "";

                html += `
                <div class="swiper-slide bg-white">
                    ${bukaTag}
                        <img src="${item.gambar}" alt="${item.judul}" class="w-full h-48 object-cover aspect-[2/1]">
                        <div class="p-4">
                            <h4 class="font-bold text-gray-800 text-sm">${item.judul}</h4>
                            <p class="text-xs text-gray-500 mt-1 line-clamp-2">${item.deskripsi}</p>
                            ${pesanWA}
                        </div>
                    ${tutupTag}
                </div>`;
            });
            
            container.innerHTML = html;
            
            // PENTING: Panggil fungsi rakit ulang Swiper
            inisialisasiSwiper();
        }

        function updateAngkaGenerasi(data, elemen) {
            if (!data || data.length === 0 || !elemen) return;
            let setGenerasi = new Set();
            data.forEach(a => {
                if (a.tanggalLahir) {
                    const match = a.tanggalLahir.toString().match(/\d{4}/);
                    if (match) {
                        const tahun = parseInt(match[0]);
                        if (tahun >= 2013) setGenerasi.add("Alpha");
                        else if (tahun >= 1997) setGenerasi.add("Z");
                        else if (tahun >= 1981) setGenerasi.add("Milenial");
                        else if (tahun >= 1965) setGenerasi.add("X");
                        else if (tahun >= 1946) setGenerasi.add("Boomers");
                    }
                }
            });
            elemen.innerText = setGenerasi.size;
        }

        // Eksekusi utama
        document.addEventListener('DOMContentLoaded', perbaruiDashboard);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker aktif!'))
                    .catch(err => console.log('SW Gagal:', err));
            });
        }
    </script>

</body>
</html>
