<html lang="id">
<head>
    <title>Beranda - Silsilah Bani Muntari</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4RDDKDQNKB"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-4RDDKDQNKB');
    </script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00e5ff">
    <meta name="apple-mobile-web-app-status-bar-style" content="#00e5ff">
    <script src="config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.min.css">
    <script type="module">
        import PhotoSwipeLightbox from 'https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe-lightbox.esm.min.js';
        
        const lightbox = new PhotoSwipeLightbox({
            gallery: '#containerIklanCloud',
            children: '.avatar-klik',
            pswpModule: () => import('https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.esm.min.js')
        });

        // Perbaikan Logika: Ambil ukuran asli gambar saat diklik
        lightbox.addFilter('domItemData', (itemData, element) => {
            const img = element.querySelector('img');
            if (img) {
                itemData.src = element.href;
                itemData.w = img.naturalWidth || 1000; // Pakai ukuran asli gambar
                itemData.h = img.naturalHeight || 1500;
            }
            return itemData;
        });

        lightbox.init();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <style>
        body { 
            background-color: #f8f9fa; 
            font-family: sans-serif; 
            -webkit-overflow-scrolling: touch; /* Scroll halus di iPhone */
        }

        /* Tambahkan ini untuk memastikan body tidak melar */
        html, body {
            max-width: 100%;
            overflow-x: hidden; /* Sembunyikan luberan ke samping */
            overflow-y: auto;   /* Pastikan vertikal aktif */
            position: relative;
            height: auto;       /* Jangan dipaksa 100% agar konten bawah bisa di-scroll */
            min-height: 100vh;
            touch-action: pan-y; /* Memberitahu browser: prioritaskan scroll vertikal */
            -webkit-overflow-scrolling: touch;
        }

        /* Jaring Pengaman Grid 3 Kolom */
        .grid.grid-cols-3 {
            display: grid !important;
            grid-template-columns: repeat(3, 1fr) !important;
            gap: 12px !important;
        }

        /* Grid Menu */
        .menu-card {
            background: white;
            border-radius: 15px;
            padding: 12px 5px !important;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #eee;
            transition: transform 0.2s;
            cursor: pointer; /* Agar muncul kursor tangan saat di desktop */
            -webkit-tap-highlight-color: transparent; /* Menghilangkan kotak biru saat di-tap di HP */
            -webkit-font-smoothing: antialiased;
        }
        /* INI CSS PENGGANTI TAILWIND UNTUK BARIS HIDUP/WAFAT */
        .status-row {
            display: flex !important;
            flex-direction: row !important;
            align-items: center !important;
            justify-content: center !important; /* Paksa semua kumpul di tengah */
            gap: 4px !important; /* Jarak antar 78, pemisah |, dan 29 sama rata */
            margin-top: 4px;
            width: 100%;
            font-size: 10px !important; /* Sedikit diperbesar biar jelas */
            font-weight: 800 !important;
            white-space: nowrap;
        }

        /* ITEM STATUS (Angka & Titik) */
        .status-item {
            display: flex !important;
            align-items: center !important;
            gap: 3px !important; /* Jarak antara titik warna dan angkanya */
        }

        /* PEMISAH VERTIKAL */
        .status-divider {
            color: #d1d5db;
            margin: 0 1px; /* Jarak super tipis agar simetris */
            opacity: 0.6;
        }

        /* TITIK WARNA */
        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0; /* Biar titik tidak gepeng kalau ruang sempit */
        }
        
        /* Lengkungan Header Tosca */
        .header-curve {
            background: linear-gradient(135deg, #00e5ff 0%, #00acc1 100%);
            height: 90px;
            border-bottom-left-radius: 10% 30px;
            border-bottom-right-radius: 10% 30px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        /* Gaya untuk angka notifikasi merah di pojok kartu */
        .badge-notif {
            position: absolute;
            top: -10px;
            right: -10px;
            background-color: #ff3d00;
            color: white;
            font-size: 12px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }
        .relative-card { position: relative; }

        .wadah-refleksi {
            position: relative;
            width: 100%;
            max-width: 100vw;
            overflow: hidden; /* Ini WAJIB ada di pembungkus luar agar refleksi tidak memicu scroll horizontal */
            padding-bottom: 40px; /* Ruang untuk pantulan */
        }

        .mySwiper {
            /* Gunakan width 100% saja, jangan vw agar tidak bentrok dengan padding */
            width: 100%; 
            
            /* Tetapkan refleksi */
            -webkit-box-reflect: below 2px -webkit-gradient(
                linear, left top, left bottom, 
                from(transparent), 
                color-stop(70%, transparent), 
                to(rgba(255, 255, 255, 0.15))
            );

            /* HAPUS overflow: visible !important jika tidak sangat diperlukan */
            /* Atau gunakan ini agar shadow tetap aman tapi tidak merusak scroll: */
            clip-path: inset(-100px -100px -200px -100px); 
        }

        /* Warna titik navigasi saat aktif */
        .swiper-pagination-bullet-active {
            background: #00e5ff !important;
        }

        /* Jarak agar konten di bawah slider tidak tertabrak */
        /* Jaring pengaman Swiper agar Shadow Kartu tidak terpotong */
        .swiper {
            clip-path: inset(-100px -100px -100px -100px); /* Bawah diperlebar untuk refleksi */
        }

        .swiper-pagination {
            position: relative !important;
            bottom: 5px !important; /* Angkat sedikit mendekat ke refleksi */
            margin-top: -50px; /* Tarik ke atas agar tidak terlalu jauh dari slider, tapi masih punya ruang untuk refleksi */
        }

        .swiper-slide {
            /* Memaksa GPU bekerja (Hardware Acceleration) */
            transform: translate3d(0, 0, 0);
            -webkit-transform: translate3d(0, 0, 0);
            
            /* Menghaluskan tepi gambar saat bergerak */
            will-change: transform;
            
            /* Mencegah gambar berkedip di Safari/iOS */
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }

        .swiper-wrapper {
            /* Menghilangkan hambatan geser di layar sentuh */
            touch-action: pan-y;
            transition-timing-function: cubic-bezier(0.23, 1, 0.32, 1) !important;
        }

        /* Pastikan gambar di dalam slide mengikuti lekukan kartu */
        .swiper-slide img {
            display: block;
            width: 100%;
        }
        
        .menu-card:active { transform: scale(0.95); }
        .menu-icon { font-size: 24px; margin-bottom: 8px; color: #00b8d4; }
        .menu-label { font-size: 11px; font-weight: 600; color: #555; line-height: 1.2; }
        .menu-value { font-size: 14px; font-weight: bold; color: #333; margin-top: 2px; }
    </style>
</head>
<body>

    <div class="header-curve">
        <h1 class="text-xl font-bold mt-4">Bani Muntari</h1>
    </div>

    <div class="px-6">
        <h3 id="sapaanUser" class="text-lg font-bold my-4 text-gray-800">
            Memuat...
        </h3>
        
        <div id="menu-utama" class="grid grid-cols-3 gap-3">
            
            <div class="menu-card" onclick="window.location.href='kenangan.html'">
                <span class="menu-icon">👥</span>
                <span class="menu-label">Jumlah Anggota</span>
                <span class="menu-value" id="angkaJumlah">0</span>
                
                <div class="status-row">
                    <div class="status-item">
                        <span class="dot" style="background-color: #16a34a;"></span>
                        <span id="jumlahHidup" style="color: #15803d;">0</span>
                    </div>
                    
                    <span class="status-divider">|</span>
                    
                    <div class="status-item">
                        <span class="dot" style="background-color: #dc2626;"></span>
                        <span id="jumlahWafat" style="color: #991b1b;">0</span>
                    </div>
                </div>
            </div>

            <div class="menu-card" onclick="window.location.href='statistik.html'">
                <span class="menu-icon">🌿</span>
                <span class="menu-label">Jumlah Generasi</span>
                <span class="menu-value" id="angkaTotalGenerasi">0</span>
            </div>

            <div class="menu-card">
                <span class="menu-icon">📅</span>
                <span class="menu-label">Acara Terdekat</span>
                <span class="menu-value">0</span>
            </div>

            <div class="menu-card">
                <span class="menu-icon">🗓️</span>
                <span class="menu-label">Acara Keluarga</span>
            </div>
            <div class="menu-card" onclick="window.location.href='tambah-anggota.html'">
                <span class="menu-icon">➕</span>
                <span class="menu-label">Tambah Anggota</span>
            </div>
            <div class="menu-card" onclick="window.location.href='cari-anggota.html'">
                <span class="menu-icon">🔍</span>
                <span class="menu-label">Cari Anggota</span>
            </div>

            <div id="menu-kabar" class="menu-card relative-card" onclick="tandaiSudahDilihat('iklan'); window.location.href='kirim-kabar.html'">
                <span class="menu-icon">📣</span>
                <span class="menu-label">Kirim Kabar & Promo</span>
            </div>
            
            <div id="menu-silsilah" class="menu-card relative-card" onclick="tandaiSudahDilihat('keluarga'); window.location.href='pohon-silsilah.html'">
                <span class="menu-icon">🌳</span>
                <span class="menu-label">Lihat Silsilah</span>
            </div>

            <div class="menu-card" onclick="window.location.href='ruang-keluarga.html'">
                <span class="menu-icon">🏠</span>
                <span class="menu-label">Ruang Keluarga</span>
            </div>
        </div>

        <div class="mt-8 mb-16 px-1"> 
            <div class="flex justify-between items-center mb-4 px-1">
                <h3 class="font-black text-gray-800 text-sm tracking-wider">Kabar & Promo</h3>
            </div>

            <div class="wadah-refleksi">
                <div class="swiper mySwiper w-full !overflow-visible">
                    <div id="containerIklanCloud" class="swiper-wrapper">
                        </div>
                </div>
            </div>
            
            <div class="swiper-pagination !-bottom-12"></div>
        </div>
    </div>
    
    <script>
        // Update fungsi window load Om untuk memanggil cekIdentitas
        window.addEventListener('load', () => {
            // 1. Cek identitas dulu
            cekIdentitas();

            // 2. Tampilkan sapaan di Beranda
            tampilkanSapaan(); 

            // 3. Hanya ambil data jika user sudah terdaftar
            if (localStorage.getItem('userNama')) {
                document.body.style.overflow = 'auto';
                perbaruiDashboardLokal();
                perbaruiDashboardCloud();
            }
            if (document.body.scrollHeight <= window.innerHeight) {
                document.body.style.overflowY = 'hidden';
            } else {
                document.body.style.overflowY = 'auto';
            }
        });
        
        // MODIFIKASI DISINI: Variabel untuk menyimpan instance swiper
        let swiperInstance;

        function tampilkanSapaan() {
            const namaSaved = localStorage.getItem('userNama');
            const elSapaan = document.getElementById('sapaanUser');
            
            if (namaSaved && elSapaan) {
                const jam = new Date().getHours();
                let waktu = "Selamat Datang";
                
                if (jam < 11) waktu = "Selamat Pagi";
                else if (jam < 15) waktu = "Selamat Siang";
                else if (jam < 18) waktu = "Selamat Sore";
                else waktu = "Selamat Malam";

                elSapaan.innerHTML = `${waktu}, <span class="text-[#00acc1]">${namaSaved}</span>!`;
            }
        }

        // MODIFIKASI DISINI: Fungsi inisialisasi tunggal dengan spek 'smooth' yang Om mau
        function inisialisasiSwiper() {
            // Hancurkan swiper lama jika sudah ada (biar tidak tumpuk/lag)
            if (swiperInstance) swiperInstance.destroy(true, true);

            swiperInstance = new Swiper(".mySwiper", {
                slidesPerView: 1,
                centeredSlides: true,
                spaceBetween: 50,
                loop: true,
                speed: 1200,
                followFinger: true,
                threshold: 10,
                touchMoveStopPropagation: true,
                longSwipes: true,
                longSwipesRatio: 0.3,
                longSwipesMs: 300,
                shortSwipes: true,
                touchRatio: 1,
                touchReleaseOnEdges: true,
                resistance: true,
                resistanceRatio: 0.85,
                autoplay: {
                    delay: 5000,
                    disableOnInteraction: false,
                },
                pagination: {
                    el: ".swiper-pagination",
                    clickable: true,
                },
            });
        }

        async function cekNotifikasiBaru(dataTerbaru) {
            if (!dataTerbaru || !dataTerbaru.keluarga || !dataTerbaru.iklan) return;
            // 1. Ambil jumlah data lama yang tersimpan di HP
            const jumlahLama = JSON.parse(localStorage.getItem('last_count')) || { keluarga: 0, iklan: 0 };
            
            // 2. Hitung jumlah data baru dari Cloud
            const jumlahKeluargaBaru = dataTerbaru.keluarga.length - jumlahLama.keluarga;
            const jumlahIklanBaru = dataTerbaru.iklan.length - jumlahLama.iklan;

            // 3. Jika ada penambahan, tampilkan Badge atau Pesan
            if (jumlahKeluargaBaru > 0 || jumlahIklanBaru > 0) {
                tampilkanBadge(jumlahKeluargaBaru, jumlahIklanBaru);
                tampilkanPesanSelamatDatang(jumlahKeluargaBaru, jumlahIklanBaru);
            }
        }

        function tampilkanBadge(kel, ikl) {
            if (kel > 0) {
                const menuSilsilah = document.getElementById('menu-silsilah');
                // Cek dulu apakah elemennya ada sebelum diisi innerHTML
                if (menuSilsilah) {
                    menuSilsilah.innerHTML += `<span class="badge-notif">${kel}</span>`;
                }
            }
            if (ikl > 0) {
                // Cari menu kabar, kalau tidak ada, jangan dipaksa
                const menuKabar = document.getElementById('menu-kabar'); 
                if (menuKabar) {
                    menuKabar.innerHTML += `<span class="badge-notif">${ikl}</span>`;
                }
            }
        }

        function tampilkanPesanSelamatDatang(kel, ikl) {
            const toast = document.createElement('div');
            
            // POSISI: 1/5 Atas (top-[10%]), BG Putih, Border Kotak Sedikit Rounded, Teks Abu Gelap
            toast.className = "fixed top-[10%] left-1/2 -translate-x-1/2 bg-white/95 text-gray-700 px-6 py-4 rounded-xl text-sm z-[9999] shadow-[0_10px_25px_-5px_rgba(0,0,0,0.5)] border border-gray-100 flex items-center gap-3 min-w-[280px] backdrop-blur-sm";
            
            // Tambahkan sedikit ikon di depan teks agar lebih manis
            let pesan = "👋 Hai! ";
            if (kel > 0) pesan += `<br><b>${kel}</b> Anggota Baru ditambahkan.`;
            if (ikl > 0) pesan += `<br><b>${ikl}</b> Kabar/Iklan Baru tersedia.`;
            
            toast.innerHTML = `
                <div class="w-1 h-8 bg-[#00e5ff] rounded-full"></div>
                <div class="flex-1">${pesan}</div>
            `;
            
            document.body.appendChild(toast);

            // Animasi masuk (Opsional: Tambahkan di CSS)
            toast.style.animation = "slideDown 0.5s ease-out";

            setTimeout(() => {
                toast.style.opacity = "0";
                toast.style.transition = "opacity 0.5s ease";
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }

        // Panggil ini SETELAH user mengklik menu atau melihat data agar notif hilang
        function tandaiSudahDilihat(dataTerbaru) {
            const counts = {
                keluarga: dataTerbaru.keluarga.length,
                iklan: dataTerbaru.iklan.length
            };
            localStorage.setItem('last_count', JSON.stringify(counts));
        }

        // FUNGSI 1: Ambil dari HP (Cepat & Offline)
        function perbaruiDashboardLokal() {
            const elJumlah = document.getElementById('angkaJumlah');
            const elGen = document.getElementById('angkaTotalGenerasi');
            const containerIklan = document.getElementById('containerIklanCloud');

            const dataLokalRaw = localStorage.getItem('dataCloud');
            
            if (dataLokalRaw) {
                const dataLokal = JSON.parse(dataLokalRaw);
                const stats = hitungStatusSederhana(dataLokal.keluarga);
                
                if (elJumlah) elJumlah.innerText = stats.total;
                if (document.getElementById('jumlahHidup')) document.getElementById('jumlahHidup').innerText = stats.hidup;
                if (document.getElementById('jumlahWafat')) document.getElementById('jumlahWafat').innerText = stats.wafat;
                if (elGen) updateAngkaGenerasi(dataLokal.keluarga, elGen);
                if (containerIklan) renderIklan(dataLokal.iklan || [], containerIklan);
            } else {
                // JIKA KOSONG (Setelah Clear Cache), beri tanda sedang loading
                if (elJumlah) elJumlah.innerText = "...";
                if (elGen) elGen.innerText = "...";
                if (containerIklan) containerIklan.innerHTML = `<div class="p-10 text-center w-full">Memuat data...</div>`;
            }
        }

        // FUNGSI 2: Ambil dari Internet (Update Data Terbaru)
        async function perbaruiDashboardCloud() {
            // JANGAN UPDATE TAMPILAN KALAU BELUM LOGIN
            if (!localStorage.getItem('userNama')) return; 

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000);

                const response = await fetch(URL_API + "?t=" + Date.now(), { signal: controller.signal });
                clearTimeout(timeoutId);

                const resJson = await response.json();
                
                if (resJson && resJson.keluarga) {
                    localStorage.setItem('dataCloud', JSON.stringify(resJson));
                    perbaruiDashboardLokal();
                    try { cekNotifikasiBaru(resJson); } catch (e) {}
                }
            } catch (err) {
                console.warn("Koneksi lambat atau offline");
            }
        }

        // Helper untuk hitung status (pindahkan logika hitung kesini agar rapi)
        function hitungStatusSederhana(data) {
            if (!data || !Array.isArray(data)) return { total: 0, hidup: 0, wafat: 0 };
            let hidup = 0, wafat = 0;
            data.forEach(a => {
                const nama = (a.nama || "").toLowerCase();
                const isAlm = nama.includes("(alm.)") || nama.includes("(almh.)");
                const statusMeninggal = a.status === "Meninggal" || a.status === "Wafat";
                if (isAlm || statusMeninggal) { wafat++; } else { hidup++; }
            });
            return { total: data.length, hidup, wafat };
        }

        // Modifikasi fungsi tandaiSudahDilihat agar lebih cerdas
        function tandaiSudahDilihat(tipe) {
            const dataCloud = JSON.parse(localStorage.getItem('dataCloud'));
            let lastCount = JSON.parse(localStorage.getItem('last_count')) || { keluarga: 0, iklan: 0 };
            
            if (dataCloud) {
                if (tipe === 'keluarga') lastCount.keluarga = dataCloud.keluarga.length;
                if (tipe === 'iklan') lastCount.iklan = dataCloud.iklan.length;
                localStorage.setItem('last_count', JSON.stringify(lastCount));
            }
        }

        function renderIklan(daftar, container) {
            const iklanAktif = daftar.filter(item => item.status === "Aktif");
            
            if (!iklanAktif || iklanAktif.length === 0) {
                container.innerHTML = `<div class="swiper-slide bg-white rounded-[15px] p-10 text-center shadow-sm">
                                        <p class="text-gray-400 text-[10px] italic">Belum ada kabar saat ini.</p>
                                    </div>`;
                return;
            }

            const dataUrut = [...iklanAktif].reverse();
            let html = '';

            dataUrut.forEach(item => {
                const isSponsor = item.link && item.link.trim() !== "";
                const hrefAction = isSponsor ? item.link : item.gambar;
                const pswpClass = !isSponsor ? "avatar-klik" : "";
                const targetAttr = isSponsor ? 'target="_blank"' : "";

                html += `
                <div class="swiper-slide"> 
                    <a href="${hrefAction}" ${targetAttr} class="${pswpClass} block relative w-full h-52 rounded-[15px] overflow-hidden shadow-lg active:scale-[0.95] transition-all">
                        <img src="${item.gambar}" class="absolute inset-0 w-full h-full object-cover" alt="Kabar">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                        <div class="absolute bottom-0 left-0 right-0 p-4 text-left">
                            <h4 class="font-bold text-white text-[13px] leading-tight mb-1 drop-shadow-md">${item.judul}</h4>
                            <p class="text-[10px] text-gray-200 line-clamp-1 font-medium drop-shadow-sm">${item.deskripsi}</p>
                        </div>
                        <div class="absolute top-2 right-2 px-2 py-1 rounded-lg shadow-lg text-[8px] font-bold uppercase tracking-wider">
                            ${isSponsor 
                                ? '<span class="bg-green-600 text-white px-2 py-1 rounded-md">Sponsor</span>' 
                                : '<span class="bg-blue-600 text-white px-2 py-1 rounded-md">Berita</span>'}
                        </div>
                    </a>
                </div>`;
            });
            
            container.innerHTML = html;
            
            setTimeout(() => {
                if (typeof inisialisasiSwiper === "function") inisialisasiSwiper();
            }, 300);
        }

        function updateAngkaGenerasi(data, elemen) {
            if (!data || data.length === 0 || !elemen) return;
            let setGenerasi = new Set();
            data.forEach(a => {
                if (a.tanggalLahir) {
                    const match = a.tanggalLahir.toString().match(/\d{4}/);
                    if (match) {
                        const tahun = parseInt(match[0]);
                        if (tahun >= 2013) setGenerasi.add("Alpha");
                        else if (tahun >= 1997) setGenerasi.add("Z");
                        else if (tahun >= 1981) setGenerasi.add("Milenial");
                        else if (tahun >= 1965) setGenerasi.add("X");
                        else if (tahun >= 1946) setGenerasi.add("Boomers");
                    }
                }
            });
            elemen.innerText = setGenerasi.size;
        }

        // --- LOGIKA IDENTITAS USER (TARUH DI DALAM TAG SCRIPT) ---

        function cekIdentitas() {
            const namaSaved = localStorage.getItem('userNama');
            if (!namaSaved) {
                const modal = document.getElementById('modalLogin');
                if (modal) {
                    modal.classList.remove('hidden');
                    modal.classList.add('flex');
                    // Kunci layar agar tidak bisa di-scroll saat modal muncul
                    document.body.style.overflow = 'hidden';
                    
                    // Kasih jeda sedikit (100ms-300ms) agar modal muncul dulu baru panggil keyboard
                    setTimeout(() => {
                        if (input) {
                            input.focus(); 
                            input.click(); // Beberapa browser TV butuh simulasi klik
                        }
                    }, 500);
                }
            }
        }

        function simpanIdentitas() {
            const input = document.getElementById('inputNamaUser');
            input.blur();

            let namaRaw = input.value.trim().toLowerCase();
            const nama = namaRaw.replace(/\b\w/g, l => l.toUpperCase());
            if (nama.length < 3) {
                alert("Nama diisi yang lengkap ya, minimal 3 huruf!");
                return;
            }

            // Ambil dataCloud dari localStorage untuk mencari foto
            const dataLokalRaw = localStorage.getItem('dataCloud');
            let fotoUser = "";

            if (dataLokalRaw) {
                const dataLokal = JSON.parse(dataLokalRaw);
                // Cari nama di data keluarga (Sheet1)
                const dataOrang = dataLokal.keluarga.find(o => o.nama.toLowerCase() === nama.toLowerCase());
                
                if (dataOrang && dataOrang.foto) {
                    fotoUser = dataOrang.foto;
                }
            }

            // Jika foto tidak ketemu, pakai avatar inisial
            if (!fotoUser) {
                fotoUser = `https://ui-avatars.com/api/?name=${encodeURIComponent(nama)}&background=00e5ff&color=fff`;
            }

            // Simpan ke memori HP
            localStorage.setItem('userNama', nama);
            localStorage.setItem('userFoto', fotoUser);

            // Tutup modal dan refresh
            alert("Salam kenal, " + nama + "!");

            const modal = document.getElementById('modalLogin');
            if (modal) {
                modal.classList.add('hidden');
                document.body.style.overflow = 'auto'; // Pastikan scroll hidup
            }
            location.reload();
        }
        
    </script>

    <div id="modalLogin" role="dialog" aria-label="Identitas Pengguna" class="fixed inset-0 bg-black/80 z-[9999] hidden items-center justify-center backdrop-blur-md p-6">
        <div class="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl text-center">
            <div class="w-20 h-20 bg-[#00e5ff] rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg shadow-cyan-200">
                <i class="fas fa-user-friends text-white text-3xl"></i>
            </div>
            <h3 class="text-xl font-black text-gray-800 mb-2">Selamat Datang!</h3>
            <p class="text-sm text-gray-500 mb-6">Silakan masukkan nama lengkap.</p>
            
            <input type="text" id="inputNamaUser" autofocus
                class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl py-4 px-6 text-center font-bold text-gray-700 focus:outline-none focus:border-[#00e5ff] transition-all mb-4 capitalize" 
                placeholder="Contoh: Muntari"
                autocomplete="off"
                spellcheck="false">
            
            <button onclick="simpanIdentitas()" class="w-full bg-[#00e5ff] text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all">
                MASUK
            </button>
        </div>
    </div>

</body>
</html>
