    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-4RDDKDQNKB');
    </script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00e5ff">

    <script src="config.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.min.css">
    <script type="module">
        import PhotoSwipeLightbox from 'https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe-lightbox.esm.min.js';
        
        const lightbox = new PhotoSwipeLightbox({
            gallery: '#containerIklanCloud',
            children: '.avatar-klik',
            pswpModule: () => import('https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.esm.min.js')
        });

        // Perbaikan Logika: Ambil ukuran asli gambar saat diklik
        lightbox.addFilter('domItemData', (itemData, element) => {
            const img = element.querySelector('img');
            if (img) {
                itemData.src = element.href;
                itemData.w = img.naturalWidth || 1000; // Pakai ukuran asli gambar
                itemData.h = img.naturalHeight || 1500;
            }
            return itemData;
        });

        lightbox.init();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <style>
        body { 
            background-color: #f8f9fa; 
            font-family: sans-serif; 
            -webkit-overflow-scrolling: touch; /* Scroll halus di iPhone */
        }

        /* Terapkan di SEMUA file .html yang macet */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            height: auto !important; /* JANGAN gunakan 100% atau 100vh */
            min-height: 100.1% !important; /* Trik agar browser tahu ada konten yang harus di-scroll */
            overflow-x: hidden !important; /* Matikan horizontal yang mengganggu */
            overflow-y: auto !important;   /* Paksa vertikal muncul */
            position: relative !important;
            touch-action: pan-y !important; /* KUNCI: Hanya izinkan scroll vertikal */
            -webkit-overflow-scrolling: touch !important; /* Scroll halus iPhone */
        }

        /* Jaring Pengaman Grid 3 Kolom */
        .grid.grid-cols-3 {
            display: grid !important;
            grid-template-columns: repeat(3, 1fr) !important;
            gap: 12px !important;
        }

        /* Grid Menu */
        .menu-card {
            background: white;
            border-radius: 15px;
            padding: 12px 5px !important;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #eee;
            transition: transform 0.2s;
            cursor: pointer; /* Agar muncul kursor tangan saat di desktop */
            -webkit-tap-highlight-color: transparent; /* Menghilangkan kotak biru saat di-tap di HP */
            -webkit-font-smoothing: antialiased;
        }
        /* INI CSS PENGGANTI TAILWIND UNTUK BARIS HIDUP/WAFAT */
        .status-row {
            display: flex !important;
            flex-direction: row !important;
            align-items: center !important;
            justify-content: center !important; /* Paksa semua kumpul di tengah */
            gap: 4px !important; /* Jarak antar 78, pemisah |, dan 29 sama rata */
            margin-top: 4px;
            width: 100%;
            font-size: 10px !important; /* Sedikit diperbesar biar jelas */
            font-weight: 800 !important;
            white-space: nowrap;
        }

        /* ITEM STATUS (Angka & Titik) */
        .status-item {
            display: flex !important;
            align-items: center !important;
            gap: 3px !important; /* Jarak antara titik warna dan angkanya */
        }

        /* PEMISAH VERTIKAL */
        .status-divider {
            color: #d1d5db;
            margin: 0 1px; /* Jarak super tipis agar simetris */
            opacity: 0.6;
        }

        /* TITIK WARNA */
        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0; /* Biar titik tidak gepeng kalau ruang sempit */
        }
        
        /* Lengkungan Header Tosca */
        .header-curve {
            background: linear-gradient(135deg, #00e5ff 0%, #00acc1 100%);
            height: 90px;
            border-bottom-left-radius: 10% 30px;
            border-bottom-right-radius: 10% 30px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        /* Gaya untuk angka notifikasi merah di pojok kartu */
        .badge-notif {
            position: absolute;
            top: -10px;
            right: -10px;
            background-color: #ff3d00;
            color: white;
            font-size: 12px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }
        .relative-card { position: relative; }

        .wadah-refleksi {
            position: relative;
            width: 100%;
            max-width: 100vw;
            overflow: hidden; /* Ini WAJIB ada di pembungkus luar agar refleksi tidak memicu scroll horizontal */
            padding-bottom: 40px; /* Ruang untuk pantulan */
        }

        .mySwiper {
            /* Gunakan width 100% saja, jangan vw agar tidak bentrok dengan padding */
            width: 100%; 
            
            /* Tetapkan refleksi */
            -webkit-box-reflect: below 2px -webkit-gradient(
                linear, left top, left bottom, 
                from(transparent), 
                color-stop(70%, transparent), 
                to(rgba(255, 255, 255, 0.15))
            );

            /* HAPUS overflow: visible !important jika tidak sangat diperlukan */
            /* Atau gunakan ini agar shadow tetap aman tapi tidak merusak scroll: */
            clip-path: inset(-100px -100px -200px -100px); 
        }

        /* Warna titik navigasi saat aktif */
        .swiper-pagination-bullet-active {
            background: #00e5ff !important;
        }

        /* Jarak agar konten di bawah slider tidak tertabrak */
        /* Jaring pengaman Swiper agar Shadow Kartu tidak terpotong */
        .swiper {
            clip-path: inset(-100px -100px -100px -100px); /* Bawah diperlebar untuk refleksi */
        }

        .swiper-pagination {
            position: relative !important;
            bottom: 5px !important; /* Angkat sedikit mendekat ke refleksi */
            margin-top: -50px; /* Tarik ke atas agar tidak terlalu jauh dari slider, tapi masih punya ruang untuk refleksi */
        }

        .swiper-slide {
            /* Memaksa GPU bekerja (Hardware Acceleration) */
            transform: translate3d(0, 0, 0);
            -webkit-transform: translate3d(0, 0, 0);
            
            /* Menghaluskan tepi gambar saat bergerak */
            will-change: transform;
            
            /* Mencegah gambar berkedip di Safari/iOS */
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }

        .swiper-wrapper {
            /* Menghilangkan hambatan geser di layar sentuh */
            touch-action: pan-y;
            transition-timing-function: cubic-bezier(0.23, 1, 0.32, 1) !important;
        }

        /* Pastikan gambar di dalam slide mengikuti lekukan kartu */
        .swiper-slide img {
            display: block;
            width: 100%;
        }

        #modalLogin {
            z-index: 10000 !important;
            backdrop-filter: blur(8px); /* Efek blur di belakang modal agar fokus */
        }
        
        .menu-card:active { transform: scale(0.95); }
        .menu-icon { font-size: 24px; margin-bottom: 8px; color: #00b8d4; }
        .menu-label { font-size: 11px; font-weight: 600; color: #555; line-height: 1.2; }
        .menu-value { font-size: 14px; font-weight: bold; color: #333; margin-top: 2px; }
    </style>
</head>
<body>

    <div class="px-6">
        <h3 id="sapaanUser" class="text-lg font-bold my-4 text-gray-800">

        </h3>
        
        <div id="menu-utama" class="grid grid-cols-3 gap-3">

            <div class="menu-card">
                <span class="menu-icon">🗓️</span>

            <div class="menu-card" onclick="window.location.href='tambah-anggota.html'">
                <span class="menu-icon">➕</span>
                <span class="menu-label">Tambah Anggota</span>
            </div>
            <div class="menu-card" onclick="window.location.href='cari-anggota.html'">
                <span class="menu-icon">🔍</span>

            <div id="menu-kabar" class="menu-card relative-card" onclick="tandaiSudahDilihat('iklan'); window.location.href='kirim-kabar.html'">

            <div class="menu-card" onclick="window.location.href='ruang-keluarga.html'">

        <div class="mt-8 mb-16 px-1"> 
            <div class="flex justify-between items-center mb-4 px-1">
                <h3 class="font-black text-gray-800 text-sm tracking-wider">Kabar & Promo</h3>
            </div>

            <div class="wadah-refleksi">
                <div class="swiper mySwiper w-full !overflow-visible">
                    <div id="containerIklanCloud" class="swiper-wrapper">
                        </div>
                </div>
            </div>
            
            <div class="swiper-pagination !-bottom-12"></div>
        </div>
    </div>
    
    <script>
        // --- 1. VARIABEL GLOBAL & STATE ---
        let swiperInstance;

        // --- 2. INITIAL LOAD ---
        window.addEventListener('load', () => {
            // Cek apakah user perlu login
            cekIdentitas();

            // Tampilkan sapaan di Dashboard
            tampilkanSapaan(); 

            // Update data jika sudah login
            if (localStorage.getItem('userNama')) {
                document.body.style.overflow = 'auto';
                perbaruiDashboardLokal();
                perbaruiDashboardCloud();
            }
            
            // Atur scroll body
            document.body.style.overflowY = (document.body.scrollHeight <= window.innerHeight) ? 'hidden' : 'auto';
        });

        // --- 3. LOGIKA IDENTITAS & AUTOCOMPLETE ---

        function cekIdentitas() {
            const namaSaved = localStorage.getItem('userNama');
            if (!namaSaved) {
                // Langsung sedot data tanpa nunggu user login
                perbaruiDashboardCloud().then(() => {
                    console.log("Data siap untuk autocomplete HP");
                });

                const modal = document.getElementById('modalLogin');
                if (modal) {
                    modal.classList.remove('hidden');
                    modal.classList.add('flex');
                    document.body.style.overflow = 'hidden';
                    
                    // Aktifkan saran nama
                    aktifkanAutocompleteNama();

                    // Di HP, auto-focus sering gagal kalau tidak dipicu klik/timeout lama
                    setTimeout(() => { 
                        const input = document.getElementById('inputNamaUser');
                        if (input) input.focus();
                    }, 1000); 
                }
            }
        }

        function aktifkanAutocompleteNama() {
            const input = document.getElementById('inputNamaUser');
            const listSaran = document.getElementById('listSaranNama'); 
            const containerAvatar = document.getElementById('containerAvatar'); 

            if (!input || !listSaran) return;

            input.addEventListener('input', function() {
                const teks = this.value.trim().toLowerCase();
                listSaran.innerHTML = '';
                
                if (teks.length < 2) {
                    listSaran.classList.add('hidden');
                    resetAvatarIcon(); // Kembali ke ikon user-friends jika dihapus
                    return;
                }

                const dataLokalRaw = localStorage.getItem('dataCloud');
                if (!dataLokalRaw) return;

                try {
                    const dataLokal = JSON.parse(dataLokalRaw);
                    const matches = dataLokal.keluarga.filter(p => 
                        p.nama && p.nama.toLowerCase().includes(teks)
                    ).slice(0, 5);

                    if (matches.length > 0) {
                        matches.forEach(p => {
                            const item = document.createElement('div');
                            item.className = "p-4 border-b border-gray-50 hover:bg-cyan-50 active:bg-cyan-100 cursor-pointer flex items-center gap-3 text-left transition-colors";
                            
                            // Logika foto: Pakai foto asli atau UI-Avatars
                            const imgUrl = (p.foto && p.foto.length > 20) ? p.foto : `https://ui-avatars.com/api/?name=${encodeURIComponent(p.nama)}&background=00e5ff&color=fff`;
                            
                            item.innerHTML = `
                                <img src="${imgUrl}" class="w-10 h-10 rounded-full object-cover shadow-sm border border-gray-100">
                                <div>
                                    <div class="font-bold text-gray-800 text-sm">${p.nama}</div>
                                    <div class="text-[9px] text-gray-400 uppercase tracking-widest">${p.status || 'Anggota'}</div>
                                </div>
                            `;
                            
                            // AKSI SAAT NAMA DIKLIK
                            item.onclick = () => {
                                input.value = p.nama; // Isi input dengan nama lengkap
                                listSaran.classList.add('hidden');
                                
                                // TAMPILKAN FOTO DI AVATAR MODAL
                                if (containerAvatar) {
                                    containerAvatar.innerHTML = `<img src="${imgUrl}" class="w-full h-full object-cover rounded-full border-2 border-white shadow-md">`;
                                }
                                
                                // Simpan sementara URL foto untuk simpanIdentitas nanti
                                input.dataset.selectedFoto = imgUrl; 
                            };
                            listSaran.appendChild(item);
                        });
                        listSaran.classList.remove('hidden');
                    } else {
                        listSaran.classList.add('hidden');
                    }

                    // Tambahan: Jika user ngetik nama lengkap persis tanpa klik saran, update foto juga
                    const exactMatch = dataLokal.keluarga.find(o => o.nama.toLowerCase() === teks);
                    if (exactMatch) {
                        const exactImg = (exactMatch.foto && exactMatch.foto.length > 20) ? exactMatch.foto : `https://ui-avatars.com/api/?name=${encodeURIComponent(exactMatch.nama)}&background=00e5ff&color=fff`;
                        containerAvatar.innerHTML = `<img src="${exactImg}" class="w-full h-full object-cover rounded-full border-2 border-white shadow-md">`;
                    }

                } catch (e) {
                    console.error("Autocomplete Error:", e);
                }
            });

            document.addEventListener('click', (e) => {
                if (e.target !== input) listSaran.classList.add('hidden');
            });
        }

        function resetAvatarIcon() {
            const containerAvatar = document.getElementById('containerAvatar');
            if (containerAvatar) {
                containerAvatar.innerHTML = `<i class="fas fa-user-friends text-white text-3xl"></i>`;
            }
        }

        function simpanIdentitas() {
            const input = document.getElementById('inputNamaUser');
            if (!input) return;
            
            let namaRaw = input.value.trim();
            if (namaRaw.length < 3) {
                alert("Masukkan nama yang lengkap ya Om!");
                return;
            }

            // Ambil foto yang tadi sudah "nempel" di input saat pilih saran
            let fotoUser = input.dataset.selectedFoto;

            // Jika foto belum ada (user ketik manual tanpa klik saran), cari lagi di data
            if (!fotoUser) {
                const dataLokalRaw = localStorage.getItem('dataCloud');
                if (dataLokalRaw) {
                    const dataLokal = JSON.parse(dataLokalRaw);
                    const orang = dataLokal.keluarga.find(o => o.nama.toLowerCase() === namaRaw.toLowerCase());
                    if (orang && orang.foto) fotoUser = orang.foto;
                }
            }

            // Fallback terakhir: pakai Inisial
            if (!fotoUser) {
                fotoUser = `https://ui-avatars.com/api/?name=${encodeURIComponent(namaRaw)}&background=00e5ff&color=fff`;
            }

            localStorage.setItem('userNama', namaRaw);
            localStorage.setItem('userFoto', fotoUser);
            
            location.reload(); // Refresh untuk masuk ke dashboard
        }

        // --- 4. DASHBOARD & UI HELPERS ---

        function tampilkanSapaan() {
            const namaSaved = localStorage.getItem('userNama');
            const elSapaan = document.getElementById('sapaanUser');
            
            if (namaSaved && elSapaan) {
                const jam = new Date().getHours();
                let waktu = "Selamat Malam";
                if (jam < 11) waktu = "Selamat Pagi";
                else if (jam < 15) waktu = "Selamat Siang";
                else if (jam < 18) waktu = "Selamat Sore";

                elSapaan.innerHTML = `${waktu}, <span class="text-[#00acc1]">${namaSaved}</span>!`;
            }
        }

        function inisialisasiSwiper() {
            if (swiperInstance) swiperInstance.destroy(true, true);
            swiperInstance = new Swiper(".mySwiper", {
                slidesPerView: 1,
                centeredSlides: true,
                spaceBetween: 50,
                loop: true,
                speed: 1200,
                autoplay: { delay: 5000, disableOnInteraction: false },
                pagination: { el: ".swiper-pagination", clickable: true },
                touchStartPreventDefault: false // Penting agar scroll HP lancar
            });
        }

        function perbaruiDashboardLokal() {
            const elJumlah = document.getElementById('angkaJumlah');
            const elGen = document.getElementById('angkaTotalGenerasi');
            const containerIklan = document.getElementById('containerIklanCloud');
            const dataLokalRaw = localStorage.getItem('dataCloud');
            
            if (dataLokalRaw) {
                const dataLokal = JSON.parse(dataLokalRaw);
                const stats = hitungStatusSederhana(dataLokal.keluarga);
                
                if (elJumlah) elJumlah.innerText = stats.total;
                if (document.getElementById('jumlahHidup')) document.getElementById('jumlahHidup').innerText = stats.hidup;
                if (document.getElementById('jumlahWafat')) document.getElementById('jumlahWafat').innerText = stats.wafat;
                if (elGen) updateAngkaGenerasi(dataLokal.keluarga, elGen);
                if (containerIklan) renderIklan(dataLokal.iklan || [], containerIklan);
            }
        }

        async function perbaruiDashboardCloud() {            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000);
                const response = await fetch(URL_API + "?t=" + Date.now(), { signal: controller.signal });
                clearTimeout(timeoutId);

                const resJson = await response.json();
                if (resJson && resJson.keluarga) {
                    localStorage.setItem('dataCloud', JSON.stringify(resJson));
                    perbaruiDashboardLokal();
                    try { cekNotifikasiBaru(resJson); } catch (e) {}
                }
            } catch (err) { 
                console.warn("Gagal ambil data cloud:", err); 
            }
        }

        function hitungStatusSederhana(data) {
            if (!data || !Array.isArray(data)) return { total: 0, hidup: 0, wafat: 0 };
            let hidup = 0, wafat = 0;
            data.forEach(a => {
                const nama = (a.nama || "").toLowerCase();
                const isAlm = nama.includes("(alm.)") || nama.includes("(almh.)") || a.status === "Meninggal" || a.status === "Wafat";
                if (isAlm) wafat++; else hidup++;
            });
            return { total: data.length, hidup, wafat };
        }

        // Modifikasi fungsi tandaiSudahDilihat agar lebih cerdas
        function tandaiSudahDilihat(tipe) {
            const dataCloud = JSON.parse(localStorage.getItem('dataCloud'));
            let lastCount = JSON.parse(localStorage.getItem('last_count')) || { keluarga: 0, iklan: 0 };
            
            if (dataCloud) {
                if (tipe === 'keluarga') lastCount.keluarga = dataCloud.keluarga.length;
                if (tipe === 'iklan') lastCount.iklan = dataCloud.iklan.length;
                localStorage.setItem('last_count', JSON.stringify(lastCount));
            }
        }

        function renderIklan(daftar, container) {
            const iklanAktif = daftar.filter(item => item.status === "Aktif");
            if (!iklanAktif.length) {
                container.innerHTML = `<div class="swiper-slide bg-white rounded-[15px] p-10 text-center shadow-sm"><p class="text-gray-400 text-[10px] italic">Belum ada kabar saat ini.</p></div>`;
                return;
            }
            let html = '';
            [...iklanAktif].reverse().forEach(item => {
                const isSponsor = item.link && item.link.trim() !== "";
                html += `
                <div class="swiper-slide"> 
                    <a href="${isSponsor ? item.link : item.gambar}" ${isSponsor ? 'target="_blank"' : ''} class="${!isSponsor ? 'avatar-klik' : ''} block relative w-full h-52 rounded-[15px] overflow-hidden shadow-lg active:scale-[0.95] transition-all">
                        <img src="${item.gambar}" class="absolute inset-0 w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                        <div class="absolute bottom-0 left-0 right-0 p-4 text-left">
                            <h4 class="font-bold text-white text-[13px] leading-tight mb-1">${item.judul}</h4>
                            <p class="text-[10px] text-gray-200 line-clamp-1">${item.deskripsi}</p>
                        </div>
                    </a>
                </div>`;
            });
            container.innerHTML = html;
            setTimeout(() => inisialisasiSwiper(), 300);
        }

        function updateAngkaGenerasi(data, elemen) {
            if (!data || !elemen) return;
            let setGenerasi = new Set();
            data.forEach(a => {
                if (a.tanggalLahir) {
                    const match = a.tanggalLahir.toString().match(/\d{4}/);
                    if (match) {
                        const thn = parseInt(match[0]);
                        if (thn >= 2013) setGenerasi.add("Alpha");
                        else if (thn >= 1997) setGenerasi.add("Z");
                        else if (thn >= 1981) setGenerasi.add("Milenial");
                        else if (thn >= 1965) setGenerasi.add("X");
                        else if (thn >= 1946) setGenerasi.add("Boomers");
                    }
                }
            });
            elemen.innerText = setGenerasi.size;
        }
    </script>

    <div id="modalLogin" class="fixed inset-0 bg-black/80 z-[9999] hidden items-center justify-center backdrop-blur-md p-6">
        <div class="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl text-center relative">
            
            <div id="containerAvatar" class="w-20 h-20 bg-[#00e5ff] rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg shadow-cyan-200 overflow-hidden">
                <i class="fas fa-user-friends text-white text-3xl"></i>
            </div>

            <h3 class="text-xl font-black text-gray-800 mb-2">Selamat Datang!</h3>
            <p class="text-sm text-gray-500 mb-6">Silakan masukkan nama lengkap.</p>
            
            <div class="relative"> <input type="text" id="inputNamaUser" autofocus
                    class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl py-4 px-6 text-center font-bold text-gray-700 focus:outline-none focus:border-[#00e5ff] transition-all mb-4 capitalize" 
                    placeholder="Contoh: Muntari"
                    autocomplete="off">
                
                <div id="listSaranNama" class="absolute left-0 right-0 top-[100%] bg-white border border-gray-100 rounded-2xl shadow-xl z-[99999] max-h-48 overflow-y-auto hidden">
                    </div>
            </div>
            
            <button onclick="simpanIdentitas()" class="w-full mt-4 bg-[#00e5ff] text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all">
                MASUK
            </button>
        </div>
    </div>
