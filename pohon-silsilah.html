    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.min.css">
    <script type="module">
    import PhotoSwipeLightbox from 'https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe-lightbox.esm.min.js';

    const lightbox = new PhotoSwipeLightbox({
        gallery: '#treeWrapper',
        children: 'a.avatar-klik',
        pswpModule: () => import('https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.esm.min.js'),
        
        // TAMBAHKAN INI: Agar dia otomatis menghitung ukuran foto yang kita beri nilai "0"
        allowPanToNext: true,
        initialZoomLevel: 'fit',
        secondaryZoomLevel: 1.5,
        maxZoomLevel: 2
    });

    // Script sakti agar PhotoSwipe membaca ukuran asli gambar secara otomatis
    lightbox.addFilter('domItemData', (itemData, element, linkEl) => {
    if (itemData.width === 0 || itemData.height === 0) {
        const img = element.querySelector('img');
        if (img) {
        itemData.width = img.naturalWidth || 1000; // Fallback ke 1000 jika belum load
        itemData.height = img.naturalHeight || 1200;
        }
    }
    return itemData;
    });

    lightbox.init();

    // Tambahkan pencegah agar browser tidak mencoba "pergi" ke link tersebut
    lightbox.on('beforeOpen', () => {
        console.log('Membuka foto keluarga...');
    });

    lightbox.init();
    </script>

    <script src="config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <style>
        
        .header-curve {
            background: linear-gradient(135deg, #00e5ff 0%, #00acc1 100%);
            height: 90px;
            border-bottom-left-radius: 10% 30px;
            border-bottom-right-radius: 10% 30px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .btn-back {
            position: absolute;
            left: 15px;
            top: 35px;
            background: rgba(39, 38, 38, 0.2);
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        .viewport {
            width: 100vw;
            height: calc(100vh - 90px);
            overflow: hidden; /* Ubah ke hidden karena kita pakai D3 Zoom */
            cursor: grab;
            background-color: #f8fafc;
            touch-action: none; /* Penting untuk D3 Zoom di HP */
        }
        /* Agar saat dragging kartu tidak tembus klik ke bawah */
        .sortable-drag {
            opacity: 0;
        }
        .viewport:active { cursor: grabbing; }
        
        .tree-canvas {
            /* Menghilangkan angka kaku 2000px */
            width: max-content; 
            min-width: 100vw; /* Minimal selebar layar HP kamu */
            
            /* Memberi ruang kosong agar saat zoom out kartu tidak mepet layar */
            padding: 100px; 
            
            /* PUSATKAN SEMUANYA DI SINI */
            display: flex;
            flex-direction: column;
            align-items: center; 
            
            /* Pastikan titik zoom ada di tengah atas */
            transform-origin: top center; 
        }

        /* --- LOGIKA GULUNG (WAJIB ADA) --- */
        .hidden-children {
            display: none !important;
        }

        /* 3. Pastikan ul.tree tidak memiliki padding bawah agar penutupnya pas */
        ul.tree {
            margin-left: 40px;
            border-left: 2px dashed #00e5ff;
            padding-bottom: 0;
            margin-bottom: 0;
        }
        li.tree-item { 
            position: relative; 
            padding-left: 30px; 
            margin-bottom: 20px; 
            list-style: none; 
        }
        li.tree-item::before {
            content: "";
            position: absolute; left: 0; top: 35px; width: 25px;
            border-top: 2px dashed #00e5ff;
        }

        /* 1. Pastikan li terakhir memiliki 'pemutus' garis */
        li.tree-item:last-child::after {
            content: "";
            position: absolute;
            /* Mulai dari titik garis horizontal (25px dari atas) */
            top: 25px; 
            left: -2px; /* Geser sedikit ke kiri untuk menutupi border-left ul */
            bottom: 0;
            width: 4px; /* Sedikit lebih tebal dari border-nya (2px) agar tertutup sempurna */
            background-color: #f8fafc; /* WAJIB: Samakan dengan warna background viewport kamu */
        }

        /* 2. Khusus untuk li yang hanya sendirian (anak tunggal), 
        kita pastikan garis bawahnya juga terputus */
        li.tree-item:only-child::after {
            top: 35px;
            bottom: 0;
        }

        .member-node {
            display: inline-flex;
            align-items: center;
            background: white;
            padding: 12px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            border: 2px solid #e2e8f0; /* Tebalkan sedikit agar perubahan warna terlihat */
            transition: all 0.3s ease;

            /* Mematikan seleksi teks secara agresif */
            -webkit-user-select: none !important;
            -moz-user-select: none !important;
            -ms-user-select: none !important;
            user-select: none !important;
            
            -webkit-touch-callout: none !important;
            -webkit-tap-highlight-color: transparent !important;
            touch-action: pan-x pan-y;   /* Biarkan scroll tetap jalan, tapi matikan gesture sistem lain */
        }

        /* Hilangkan filter/efek aktif di member-node agar tidak bentrok */
        .member-node:active {
            background-color: white !important; 
            transition: none !important;
        }
        .drag-handle {
            touch-action: none; /* WAJIB: Mencegah layar ikut geser saat handle ditekan */
            -webkit-user-select: none;
            user-select: none;
        }

        /* Efek saat handle ditekan (pemicu awal) */
        .drag-handle:active {
            color: #00e5ff;
        }

        /* Animasi goyang saat kartu terpilih (chosen) */
        @keyframes shake-it {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(1deg); }
            75% { transform: rotate(-1deg); }
            100% { transform: rotate(0deg); }
        }

        /* Saat kartu 'lepas' dan siap geser */
        .sortable-chosen {
            background-color: #e0f7fa !important;
            border: 2px solid #00e5ff !important;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15) !important;
            transform: scale(1.05) !important;
            animation: shake-it 0.2s infinite; /* Efek goyang dikit */
            z-index: 100;
        }

        /* Pastikan PhotoSwipe di atas segalanya */
        .pswp {
            z-index: 9999;
        }

        #treeWrapper {
            transform-origin: top center; 
            display: flex;
            flex-direction: column;
            align-items: center; /* Memastikan isi silsilah selalu di tengah kanvas */
        }

        /* Supaya container pohon tidak pecah saat scale down */
        #treeWrapper, .tree-item, .member-node {
            will-change: transform, opacity;
            backface-visibility: hidden; /* Mencegah kedipan saat zoom */
        }

        /* Pastikan klik foto tidak memicu toggle children */
        .avatar-klik {
            position: relative;
            z-index: 10;
            display: inline-block;
        }

        /* Matikan efek scale pada member-node JIKA yang diklik adalah avatar */
        .member-node:has(.avatar-klik:active) {
            transform: none !important;
        }

        /* Pastikan PhotoSwipe muncul di lapisan paling atas layar */
        .pswp {
            z-index: 99999 !important;
        }
        
        /* Tapi aktifkan kembali khusus untuk kartu yang sedang ditekan lama */
        .sortable-chosen .member-node {
            pointer-events: auto !important;
        }
        /* Update pada CSS yang sudah ada */
        body {
            -webkit-user-select: none;
            user-select: none;
        }

        /* Tambahkan class pembantu untuk kondisi sedang menggeser */
        body.sorting-active {
            cursor: grabbing !important;
        }

        body.sorting-active .member-node {
            pointer-events: none; /* Cegah kartu lain bereaksi saat sedang drag */
        }

        /* Cegah gambar ikut melayang saat ditarik di Desktop */
        img {
            -webkit-user-drag: none;
        }
    </style>
</head>

<body class="bg-gray-50 overflow-hidden"> 
    <div id="loadingOverlay" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center p-6 text-center">
        <div class="w-16 h-16 border-4 border-[#00e5ff] border-t-transparent rounded-full animate-spin mb-6"></div>
        
        <p id="loadingText" class="text-lg font-bold text-gray-700 mt-4" style="transition: opacity 0.5s;">
            Sedang mengumpulkan data keluarga...
        </p>
    </div>

    <div class="header-curve">
        <button onclick="window.location.href='index.html'" class="btn-back">←</button>
        <h1 class="text-xl font-bold">Eksplorasi Silsilah</h1>
    </div>

    <div id="scrollContainer" class="viewport">
        <div id="treeWrapper" class="tree-canvas">
            </div>
    </div>

    <script>

        const kalimatLucu = [ // Pastikan namanya konsisten
            "Sabar, lagi nyari foto {nama} yang paling glowing...",
            "Sedang menghubungkan tali keluarga ...",
            "Bentar, lagi nanya ke sesepuh siapa saja cucu-cucunya...",
            "Lagi nyusun silsilah, jangan sampai ada yang ketuker!",
            "Data sedang diperjalanan, semoga nggak kena macet...",
            "Mempersiapkan pohon, pastikan akar keluarga Mbah Muntari tetap kuat."
        ];

        // Ganti bagian D3.js yang lama dengan ini:
        const container = d3.select("#scrollContainer");
        const content = d3.select("#treeWrapper");

        const zoom = d3.zoom()
            .scaleExtent([0.3, 3])
            .filter(event => {
                // JANGAN aktifkan zoom jika yang ditekan adalah drag-handle
                return !event.target.classList.contains('drag-handle') && !event.button;
            })
            .on("zoom", (event) => {
                content.style("transform", `translate3d(${event.transform.x}px, ${event.transform.y}px, 0) scale(${event.transform.k})`);
            });

        // Aktifkan zoom hanya jika tidak sedang menggeser kartu (Sortable)
        container.call(zoom);

        // FUNGSI UTAMA: Ambil data dari LocalStorage (Key: dataCloud)
        function getDaftarKeluarga() {
            const dataRaw = localStorage.getItem('dataCloud');
            if (dataRaw) {
                const parsed = JSON.parse(dataRaw);
                return parsed.keluarga || []; // Ambil array keluarga saja
            }
            return [];
        }

        function tampilkanKalimatAcak() {
            const el = document.getElementById('loadingText');
            if (!el) return;

            const daftar = JSON.parse(localStorage.getItem('daftarKeluarga')) || [];
            
            let namaAcak = "Mbah Muntari";
            if (daftar.length > 0) {
                const orangAcak = daftar[Math.floor(Math.random() * daftar.length)];
                namaAcak = orangAcak.nama;
            }

            // PERBAIKAN: Gunakan 'kalimatLucu', bukan 'templatKalimat'
            const templat = kalimatLucu[Math.floor(Math.random() * kalimatLucu.length)];

            el.innerText = templat.replace("{nama}", namaAcak);
        }

        // JALANKAN PERTAMA KALI (INSTAN)
        tampilkanKalimatAcak();

        // JALANKAN BERIKUTNYA SECARA BERKALA (SETIAP 3.5 DETIK)
        const intervalKalimat = setInterval(() => {
            const el = document.getElementById('loadingText');
            if (el) {
                el.style.opacity = 0; // Efek fade out
                setTimeout(() => {
                    tampilkanKalimatAcak(); // Ganti teks secara acak
                    el.style.opacity = 1; // Efek fade in
                }, 500);
            }
        }, 5000);

        // FUNGSI UNTUK MENGHILANGKAN LOADING
        function sembunyikanLoading() {
            clearInterval(intervalKalimat);
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) {
                // Tambahkan efek transisi biar halus
                overlay.style.transition = "opacity 0.5s";
                overlay.style.opacity = "0";
                setTimeout(() => overlay.remove(), 500);
            }
        } 
        
        async function kirimUpdateKeCloud(daftarTerupdate) {
            // Tampilkan notifikasi kecil di pojok layar
            const toast = document.createElement('div');
            toast.className = "fixed bottom-5 right-5 bg-orange-500 text-white px-4 py-2 rounded-full shadow-lg z-[100] text-sm";
            toast.innerText = "☁️ Menyimpan urutan ke Cloud...";
            document.body.appendChild(toast);

            // Siapkan data ringkas (hanya ID dan urutan saja biar ringan)
            const dataRingkas = daftarTerupdate.map(orang => ({
                id: orang.id,
                anakKe: orang.anakKe
            }));

            try {
                const formData = new FormData();
                formData.append("action", "UPDATE_URUTAN");
                formData.append("jsonUrutan", JSON.stringify(dataRingkas));

                const response = await fetch(URL_API, {
                    method: "POST",
                    body: formData
                });

                if (response.ok) {
                    toast.innerText = "✅ Urutan tersimpan permanen!";
                    toast.classList.replace("bg-orange-500", "bg-green-500");
                    setTimeout(() => toast.remove(), 3000);
                }
            } catch (error) {
                toast.innerText = "❌ Gagal kirim ke Cloud, tapi aman di Lokal.";
                toast.classList.replace("bg-orange-500", "bg-red-500");
                setTimeout(() => toast.remove(), 3000);
            }
        }

        async function loadDataDariCloud() {
            try {
                const response = await fetch(URL_API);
                const data = await response.json();
                // PERBAIKAN: Simpan dengan key 'dataCloud' agar sama dengan index.html
                localStorage.setItem('dataCloud', JSON.stringify(data));
                renderPohon(); 
            } catch (error) {
                console.log("Gagal sinkron, menggunakan data lokal.");
                renderPohon(); 
            }
        }

        

        function renderPohon() {
            const daftar = getDaftarKeluarga(); 
            const wrapper = document.getElementById('treeWrapper');
            
            if (daftar.length === 0) {
                wrapper.innerHTML = "<p class='text-center text-gray-400 mt-10 italic'>Belum ada data keluarga...</p>";
                return;
            }
            
            // PERBAIKAN LOGIKA DISINI:
            // Akar adalah yang tidak punya parentID DAN statusnya bukan 'pasangan'
            // Jadi menantu (Ramelan) tidak akan pernah jadi akar meskipun parentID-nya kosong.
            const akarKeluarga = daftar.filter(a => {
                const gapunyaOrangTua = (a.parentID === 'none' || a.parentID === '' || !a.parentID);
                const bukanPasangan = (a.status !== 'pasangan');
                return gapunyaOrangTua && bukanPasangan;
            });

            let htmlUtama = "";
            akarKeluarga.forEach(kepala => {
                htmlUtama += buildNode(kepala, daftar);
            });
            
            wrapper.innerHTML = htmlUtama;
            
            aktifkanFiturGeser();  
            sembunyikanLoading();
        }

        // Tambahkan ini di bawah fungsi renderPohon
        document.addEventListener('click', function(e) {
            if (e.target.closest('.avatar-klik')) {
                e.preventDefault(); // STOP browser agar tidak pindah halaman
            }
        }, true);

        function buildNode(orang, semuaData) {
            // 1. Cari data Pasangan berdasarkan idPasangan
            const pasangan = semuaData.find(a => a.id === orang.idPasangan);
            const anakAnak = semuaData.filter(a => {
                const isAnakKandung = a.parentID == orang.id;
                const isAnakPasangan = pasangan ? (a.parentID == pasangan.id) : false;
                
                return (isAnakKandung || isAnakPasangan) && a.status === 'anak';
            });
            const punyaKeturunan = anakAnak.length > 0;

            // --- LOGIKA TAMPILAN FOTO (UTAMA) ---
            const urlFotoUtama = (orang.foto && orang.foto !== "" && !orang.foto.includes('http://127.0.0.1')) ? orang.foto : 'img/avatar-default.png'; // Pastikan ada fallback gambar

            // Gunakan atribut data-pswp-src, href-nya dikosongkan saja atau pakai '#'
            const fotoUtama = `
                <a href="javascript:void(0)" 
                class="avatar-klik" 
                data-pswp-src="${urlFotoUtama}" 
                data-pswp-width="0" 
                data-pswp-height="0">
                    <img src="${urlFotoUtama}" loading="lazy" class="w-12 h-12 rounded-full object-cover border-2 border-white shadow-sm">
                </a>`;

            // --- LOGIKA TAMPILAN PASANGAN (JIKA ADA) ---
            let elemenPasangan = "";
            if (pasangan) {
                const urlFotoPasangan = (pasangan.foto && pasangan.foto !== "" && !pasangan.foto.includes('http://127.0.0.1')) ? pasangan.foto : 'img/avatar-default.png';
                
                const fotoPasangan = `
                    <a href="${urlFotoPasangan}" 
                    class="avatar-klik"
                    data-pswp-width="0" 
                    data-pswp-height="0" 
                    target="_blank">
                        <img src="${urlFotoPasangan}" class="w-12 h-12 rounded-full object-cover border-2 border-white shadow-sm">
                    </a>`;
                
                elemenPasangan = `
                    <div class="flex items-center ml-2 border-l-2 border-gray-100 pl-3">
                        ${fotoPasangan}
                        <div class="ml-2">
                            <p class="font-bold text-gray-700 leading-tight text-sm">${pasangan.nama}</p>
                        </div>
                    </div>`;
            }

            let eventKlik = punyaKeturunan ? `onclick="toggleChildren(this, '${orang.id}')"` : "";
            let kursor = punyaKeturunan ? "cursor-pointer" : "cursor-default";
            let borderStyle = punyaKeturunan ? "border-color: #ffa000;" : "border-color: #e2e8f0;";

            let nodeHtml = `
                <div class="tree-item-group mb-6">
                    <div class="flex items-center">
                        <div class="member-node ${kursor} active:scale-95 transition-transform flex items-center" ${eventKlik} id="node-${orang.id}" style="${borderStyle}">
                            <div class="drag-handle mr-3 text-gray-300 cursor-grab p-2 -ml-2 text-xl">⠿</div>
                            <div class="flex items-center">
                                ${fotoUtama}
                                <div class="ml-3">
                                    <p class="font-bold text-gray-800 leading-tight text-lg">${orang.nama}</p>
                                    <p class="text-sm text-gray-600 italic leading-snug whitespace-normal max-w-[180px] sm:max-w-[250px]">
                                        📍 ${orang.domisili || 'Lokasi belum diisi'}
                                    </p>
                                </div>
                            </div>

                            ${elemenPasangan}

                            ${punyaKeturunan ? '<span id="indicator-'+orang.id+'" class="text-[12px] text-orange-500 font-bold ml-4">▶</span>' : ''}
                        </div>
                    </div>
            `;

            if (punyaKeturunan) {
                // Tambahkan class 'list-anak' dan ID yang unik
                nodeHtml += `<ul class="tree mt-4 hidden-children list-anak" id="children-${orang.id}">`;
                
                // URUTKAN TERLEBIH DAHULU berdasarkan anakKe
                anakAnak.sort((a, b) => {
                    // Jika keduanya punya urutan, bandingkan urutannya
                    if (a.anakKe && b.anakKe) {
                        return parseInt(a.anakKe) - parseInt(b.anakKe);
                    }
                    // Jika salah satu tidak punya urutan (baru diedit/input), 
                    // jangan dipindah ke bawah (biarkan di posisi aslinya)
                    return 0; 
                });

                anakAnak.forEach(anak => {
                    // Tambahkan class 'tree-item' dan data-id agar bisa dikenali saat digeser
                    nodeHtml += `<li class="tree-item kartu-anak" data-id="${anak.id}">`;
                    nodeHtml += buildNode(anak, semuaData); 
                    nodeHtml += `</li>`;
                });
                nodeHtml += `</ul>`;
            }

            nodeHtml += `</div>`;
            return nodeHtml;
        }

        function toggleChildren(el, id) {
            if (d3.event && d3.event.defaultPrevented) return;
            const targetUl = document.getElementById(`children-${id}`);
            const indicator = document.getElementById(`indicator-${id}`);
            if (targetUl) {
                const isHidden = targetUl.classList.toggle('hidden-children');
                if (isHidden) {
                    el.style.borderColor = "#ffa000";
                    if(indicator) indicator.innerText = "▶";
                } else {
                    el.style.borderColor = "#e2e8f0";
                    if(indicator) indicator.innerText = "▼";
                }
            }
        }

        function aktifkanFiturGeser() {
            const semuaListAnak = document.querySelectorAll('.list-anak');

            semuaListAnak.forEach(listEl => {
                Sortable.create(listEl, {
                    handle: ".drag-handle", // Titik 6 sebagai pemicu
                    animation: 150,
                    delay: 300,             // Tahan 0.3 detik saja untuk mulai geser
                    delayOnTouchOnly: true, // Hanya berlaku di HP agar klik biasa tidak terganggu
                    touchStartThreshold: 5, // Sensitivitas geseran jari
                    
                    onStart: function() {
                        // MATIKAN ZOOM saat mulai drag agar layar tidak lari
                        container.on('.zoom', null);
                        if (navigator.vibrate) navigator.vibrate(50); // Efek getar biar mantap
                        document.body.style.overflow = 'hidden';    // Kunci scroll body
                    },
                    
                    onEnd: function() {
                        // 1. Aktifkan kembali Zoom D3
                        container.call(zoom);
                        // 2. Hapus penanda di Body
                        document.body.classList.remove('sorting-active');
                        document.body.style.overflow = '';

                        // 3. FIX MOUSE NYANGKUT: Kirim event mouseup buatan ke seluruh dokumen
                        const mouseUpEvent = new MouseEvent('mouseup', {
                            bubbles: true,
                            cancelable: true,
                            view: window
                        });
                        window.dispatchEvent(mouseUpEvent);

                        // 4. Bersihkan sisa-sisa seleksi teks jika ada
                        window.getSelection().removeAllRanges();

                        simpanUrutanBaru(listEl);
                    }
                });
            });
        }

        function simpanUrutanBaru(kontainer) {
            // Ambil data dari key yang benar: 'dataCloud'
            let dataFull = JSON.parse(localStorage.getItem('dataCloud')) || { keluarga: [] };
            let daftarKeluarga = dataFull.keluarga;

            const semuaKartuDiSini = kontainer.querySelectorAll(':scope > .kartu-anak');
            
            let urutanBerubah = false;

            semuaKartuDiSini.forEach((kartu, index) => {
                const idAnak = kartu.getAttribute('data-id');
                const orang = daftarKeluarga.find(a => a.id.toString() === idAnak.toString());
                
                if (orang) {
                    const urutanBaru = index + 1;
                    if (orang.anakKe !== urutanBaru) {
                        orang.anakKe = urutanBaru;
                        urutanBerubah = true;
                    }
                }
            });

            if (urutanBerubah) {
                // Simpan ke Local Storage agar saat refresh tetap di posisi baru
                localStorage.setItem('dataCloud', JSON.stringify(dataFull));
                
                // Kirim ke Google Sheets agar permanen
                kirimUpdateKeCloud(daftarKeluarga); 
            }
        }// <--- Penutup fungsi simpanUrutanBaru

        // Gunakan ini untuk memastikan halaman benar-benar siap
        window.addEventListener('DOMContentLoaded', () => {
            loadDataDariCloud();
        }); // <--- Penutup EventListener
    </script>
</body>
</html>
