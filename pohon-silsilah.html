<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        .header-curve {
            background: linear-gradient(135deg, #00e5ff 0%, #00acc1 100%);
            height: 90px;
            border-bottom-left-radius: 10% 30px;
            border-bottom-right-radius: 10% 30px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .btn-back {
            position: absolute;
            left: 15px;
            top: 35px;
            background: rgba(39, 38, 38, 0.2);
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        .viewport {
            width: 100vw;
            height: calc(100vh - 90px);
            overflow: auto;
            cursor: grab;
            background-color: #f8fafc;
        }
        .viewport:active { cursor: grabbing; }
        .tree-canvas {
            min-width: 2000px;
            padding: 50px;
            display: inline-block;
        }

        /* --- LOGIKA GULUNG (WAJIB ADA) --- */
        .hidden-children {
            display: none !important;
        }

        ul.tree { 
            margin-left: 40px; 
            border-left: 2px dashed #00e5ff; 
        }
        li.tree-item { 
            position: relative; 
            padding-left: 30px; 
            margin-bottom: 20px; 
            list-style: none; 
        }
        li.tree-item::before {
            content: "";
            position: absolute; left: 0; top: 25px; width: 25px;
            border-top: 2px dashed #00e5ff;
        }
        .member-node {
            display: inline-flex;
            align-items: center;
            background: white;
            padding: 12px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            border: 2px solid #e2e8f0; /* Tebalkan sedikit agar perubahan warna terlihat */
            transition: all 0.3s ease;
        }

        /* Efek saat kartu ditekan lama tapi belum bisa geser (0-5 detik) */
        .tree-item:active {
            background-color: #fff9c4 !important; /* Kuning pucat */
            transition: background-color 5s linear;
        }

        /* Efek saat kartu sudah "lepas" dan siap digeser (setelah 5 detik) */
        .sortable-chosen {
            background-color: #e0f7fa !important;
            border: 2px solid #00e5ff !important;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1) !important;
            cursor: grabbing !important;
        }
    </style>
</head>

<body class="bg-gray-50 overflow-hidden"> 
    <div id="loadingOverlay" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center p-6 text-center">
        <div class="w-16 h-16 border-4 border-[#00e5ff] border-t-transparent rounded-full animate-spin mb-6"></div>
        
        <p id="loadingText" class="text-lg font-bold text-gray-700 mt-4" style="transition: opacity 0.5s;">
            Sedang mengumpulkan data keluarga...
        </p>
    </div>

    <div class="header-curve">
        <button onclick="window.location.href='index.html'" class="btn-back">←</button>
        <h1 class="text-xl font-bold">Eksplorasi Silsilah</h1>
    </div>

    <div id="scrollContainer" class="viewport">
        <div id="treeWrapper" class="tree-canvas">
            </div>
    </div>

    <script>

        const kalimatLucu = [ // Pastikan namanya konsisten
            "Sabar, lagi nyari foto {nama} yang paling glowing...",
            "Sedang menghubungkan tali keluarga ...",
            "Bentar, lagi nanya ke sesepuh siapa saja cucu-cucunya...",
            "Lagi nyusun silsilah, jangan sampai ada yang ketuker!",
            "Data sedang diperjalanan, semoga nggak kena macet...",
            "Mempersiapkan pohon, pastikan akar keluarga Mbah Muntari tetap kuat."
        ];

        // FUNGSI UTAMA: Ambil data dari LocalStorage (Key: dataCloud)
        function getDaftarKeluarga() {
            const dataRaw = localStorage.getItem('dataCloud');
            if (dataRaw) {
                const parsed = JSON.parse(dataRaw);
                return parsed.keluarga || []; // Ambil array keluarga saja
            }
            return [];
        }

        function tampilkanKalimatAcak() {
            const el = document.getElementById('loadingText');
            if (!el) return;

            const daftar = JSON.parse(localStorage.getItem('daftarKeluarga')) || [];
            
            let namaAcak = "Mbah Muntari";
            if (daftar.length > 0) {
                const orangAcak = daftar[Math.floor(Math.random() * daftar.length)];
                namaAcak = orangAcak.nama;
            }

            // PERBAIKAN: Gunakan 'kalimatLucu', bukan 'templatKalimat'
            const templat = kalimatLucu[Math.floor(Math.random() * kalimatLucu.length)];

            el.innerText = templat.replace("{nama}", namaAcak);
        }

        // JALANKAN PERTAMA KALI (INSTAN)
        tampilkanKalimatAcak();

        // JALANKAN BERIKUTNYA SECARA BERKALA (SETIAP 3.5 DETIK)
        const intervalKalimat = setInterval(() => {
            const el = document.getElementById('loadingText');
            if (el) {
                el.style.opacity = 0; // Efek fade out
                setTimeout(() => {
                    tampilkanKalimatAcak(); // Ganti teks secara acak
                    el.style.opacity = 1; // Efek fade in
                }, 500);
            }
        }, 5000);

        // FUNGSI UNTUK MENGHILANGKAN LOADING
        function sembunyikanLoading() {
            clearInterval(intervalKalimat);
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) {
                // Tambahkan efek transisi biar halus
                overlay.style.transition = "opacity 0.5s";
                overlay.style.opacity = "0";
                setTimeout(() => overlay.remove(), 500);
            }
        } 
        
        async function kirimUpdateKeCloud(daftarTerupdate) {
            // Tampilkan notifikasi kecil di pojok layar
            const toast = document.createElement('div');
            toast.className = "fixed bottom-5 right-5 bg-orange-500 text-white px-4 py-2 rounded-full shadow-lg z-[100] text-sm";
            toast.innerText = "☁️ Menyimpan urutan ke Cloud...";
            document.body.appendChild(toast);

            // Siapkan data ringkas (hanya ID dan urutan saja biar ringan)
            const dataRingkas = daftarTerupdate.map(orang => ({
                id: orang.id,
                anakKe: orang.anakKe
            }));

            try {
                const formData = new FormData();
                formData.append("action", "UPDATE_URUTAN");
                formData.append("jsonUrutan", JSON.stringify(dataRingkas));

                const response = await fetch(URL_API, {
                    method: "POST",
                    body: formData
                });

                if (response.ok) {
                    toast.innerText = "✅ Urutan tersimpan permanen!";
                    toast.classList.replace("bg-orange-500", "bg-green-500");
                    setTimeout(() => toast.remove(), 3000);
                }
            } catch (error) {
                toast.innerText = "❌ Gagal kirim ke Cloud, tapi aman di Lokal.";
                toast.classList.replace("bg-orange-500", "bg-red-500");
                setTimeout(() => toast.remove(), 3000);
            }
        }

        async function loadDataDariCloud() {
            try {
                const response = await fetch(URL_API);
                const data = await response.json();
                // PERBAIKAN: Simpan dengan key 'dataCloud' agar sama dengan index.html
                localStorage.setItem('dataCloud', JSON.stringify(data));
                renderPohon(); 
            } catch (error) {
                console.log("Gagal sinkron, menggunakan data lokal.");
                renderPohon(); 
            }
        }

        // Fitur Drag untuk PC
        const slider = document.getElementById('scrollContainer');
        let isDown = false; let startX, startY, scrollLeft, scrollTop;

        slider.addEventListener('mousedown', (e) => {
            isDown = true; startX = e.pageX - slider.offsetLeft; startY = e.pageY - slider.offsetTop;
            scrollLeft = slider.scrollLeft; scrollTop = slider.scrollTop;
        });
        slider.addEventListener('mouseleave', () => isDown = false);
        slider.addEventListener('mouseup', () => isDown = false);
        slider.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - slider.offsetLeft; const y = e.pageY - slider.offsetTop;
            slider.scrollLeft = scrollLeft - (x - startX) * 1.5;
            slider.scrollTop = scrollTop - (y - startY) * 1.5;
        });

        function renderPohon() {
            const daftar = getDaftarKeluarga(); 
            const wrapper = document.getElementById('treeWrapper');
            
            if (daftar.length === 0) {
                wrapper.innerHTML = "<p class='text-center text-gray-400 mt-10 italic'>Belum ada data keluarga...</p>";
                return;
            }
            
            // PERBAIKAN LOGIKA DISINI:
            // Akar adalah yang tidak punya parentID DAN statusnya bukan 'pasangan'
            // Jadi menantu (Ramelan) tidak akan pernah jadi akar meskipun parentID-nya kosong.
            const akarKeluarga = daftar.filter(a => {
                const gapunyaOrangTua = (a.parentID === 'none' || a.parentID === '' || !a.parentID);
                const bukanPasangan = (a.status !== 'pasangan');
                return gapunyaOrangTua && bukanPasangan;
            });

            let htmlUtama = "";
            akarKeluarga.forEach(kepala => {
                htmlUtama += buildNode(kepala, daftar);
            });
            
            wrapper.innerHTML = htmlUtama;
            
            aktifkanFiturGeser();  
            sembunyikanLoading();
        }

        function buildNode(orang, semuaData) {
            // 1. Cari data Pasangan berdasarkan idPasangan
            const pasangan = semuaData.find(a => a.id === orang.idPasangan);
            const anakAnak = semuaData.filter(a => {
                const isAnakKandung = a.parentID == orang.id;
                const isAnakPasangan = pasangan ? (a.parentID == pasangan.id) : false;
                
                return (isAnakKandung || isAnakPasangan) && a.status === 'anak';
            });
            const punyaKeturunan = anakAnak.length > 0;

            // --- LOGIKA TAMPILAN FOTO (UTAMA) ---
            const fotoUtama = (orang.foto && orang.foto !== "" && !orang.foto.includes('http://127.0.0.1')) 
                ? `<img src="${orang.foto}" class="w-12 h-12 rounded-full object-cover border-2 border-white shadow-sm">`
                : `<div class="w-12 h-12 rounded-full bg-[#00e5ff] flex items-center justify-center shadow-sm border-2 border-white">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </div>`;

            // --- LOGIKA TAMPILAN PASANGAN (JIKA ADA) ---
            let elemenPasangan = "";
            if (pasangan) {
                const fotoPasangan = (pasangan.foto && pasangan.foto !== "" && !pasangan.foto.includes('http://127.0.0.1'))
                    ? `<img src="${pasangan.foto}" class="w-12 h-12 rounded-full object-cover border-2 border-white shadow-sm -ml-3">`
                    : `<div class="w-12 h-12 rounded-full bg-pink-400 flex items-center justify-center -ml-3 shadow-sm border-2 border-white">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    </div>`;
                
                elemenPasangan = `
                    <div class="flex items-center ml-2 border-l-2 border-gray-100 pl-3">
                        ${fotoPasangan}
                        <div class="ml-2">
                            <p class="font-bold text-gray-700 leading-tight text-sm">${pasangan.nama}</p>
                        </div>
                    </div>`;
            }

            let eventKlik = punyaKeturunan ? `onclick="toggleChildren(this, '${orang.id}')"` : "";
            let kursor = punyaKeturunan ? "cursor-pointer" : "cursor-default";
            let borderStyle = punyaKeturunan ? "border-color: #ffa000;" : "border-color: #e2e8f0;";

            let nodeHtml = `
                <div class="tree-item-group mb-6">
                    <div class="flex items-center">
                        <div class="member-node ${kursor} active:scale-95 transition-transform flex items-center" ${eventKlik} id="node-${orang.id}" style="${borderStyle}">
                            
                            <div class="flex items-center">
                                ${fotoUtama}
                                <div class="ml-3">
                                    <p class="font-bold text-gray-800 leading-tight text-lg">${orang.nama}</p>
                                    <p class="text-sm text-gray-600 italic leading-snug whitespace-normal max-w-[180px] sm:max-w-[250px]">
                                        📍 ${orang.domisili || 'Lokasi belum diisi'}
                                    </p>
                                </div>
                            </div>

                            ${elemenPasangan}

                            ${punyaKeturunan ? '<span id="indicator-'+orang.id+'" class="text-[12px] text-orange-500 font-bold ml-4">▶</span>' : ''}
                        </div>
                    </div>
            `;

            if (punyaKeturunan) {
                // Tambahkan class 'list-anak' dan ID yang unik
                nodeHtml += `<ul class="tree mt-4 hidden-children list-anak" id="children-${orang.id}">`;
                
                // URUTKAN TERLEBIH DAHULU berdasarkan anakKe
                anakAnak.sort((a, b) => {
                    // Jika keduanya punya urutan, bandingkan urutannya
                    if (a.anakKe && b.anakKe) {
                        return parseInt(a.anakKe) - parseInt(b.anakKe);
                    }
                    // Jika salah satu tidak punya urutan (baru diedit/input), 
                    // jangan dipindah ke bawah (biarkan di posisi aslinya)
                    return 0; 
                });

                anakAnak.forEach(anak => {
                    // Tambahkan class 'tree-item' dan data-id agar bisa dikenali saat digeser
                    nodeHtml += `<li class="tree-item kartu-anak" data-id="${anak.id}">`;
                    nodeHtml += buildNode(anak, semuaData); 
                    nodeHtml += `</li>`;
                });
                nodeHtml += `</ul>`;
            }

            nodeHtml += `</div>`;
            return nodeHtml;
        }

        function toggleChildren(el, id) {
            const targetUl = document.getElementById(`children-${id}`);
            const indicator = document.getElementById(`indicator-${id}`);
            if (targetUl) {
                const isHidden = targetUl.classList.toggle('hidden-children');
                if (isHidden) {
                    el.style.borderColor = "#ffa000";
                    if(indicator) indicator.innerText = "▶";
                } else {
                    el.style.borderColor = "#e2e8f0";
                    if(indicator) indicator.innerText = "▼";
                }
            }
        }

        function aktifkanFiturGeser() {
            const semuaListAnak = document.querySelectorAll('.list-anak');

            semuaListAnak.forEach(listEl => {
                Sortable.create(listEl, {
                    animation: 150,
                    delay: 5000,          // Kunci 5 detik (5000ms)
                    delayOnTouchOnly: false, // MATIKAN ini agar mouse juga kena delay
                    touchStartThreshold: 5, // Toleransi goyangan jari/mouse sedikit
                    draggable: ".tree-item",
                    ghostClass: "bg-blue-50", // Warna bayangan saat digeser
                    chosenClass: "scale-105",  // Efek membesar saat terpilih
                    onEnd: function () {
                        // Simpan setiap kali selesai geser
                        simpanUrutanBaru(listEl);
                    },
                });
            });
        }

        function simpanUrutanBaru(kontainer) {
            // Ambil data dari key yang benar: 'dataCloud'
            let dataFull = JSON.parse(localStorage.getItem('dataCloud')) || { keluarga: [] };
            let daftarKeluarga = dataFull.keluarga;

            const semuaKartuDiSini = kontainer.querySelectorAll(':scope > .kartu-anak');
            
            let urutanBerubah = false;

            semuaKartuDiSini.forEach((kartu, index) => {
                const idAnak = kartu.getAttribute('data-id');
                const orang = daftarKeluarga.find(a => a.id.toString() === idAnak.toString());
                
                if (orang) {
                    const urutanBaru = index + 1;
                    if (orang.anakKe !== urutanBaru) {
                        orang.anakKe = urutanBaru;
                        urutanBerubah = true;
                    }
                }
            });

            if (urutanBerubah) {
                // Simpan ke Local Storage agar saat refresh tetap di posisi baru
                localStorage.setItem('dataCloud', JSON.stringify(dataFull));
                
                // Kirim ke Google Sheets agar permanen
                kirimUpdateKeCloud(daftarKeluarga); 
            }
        }// <--- Penutup fungsi simpanUrutanBaru

        // Gunakan ini untuk memastikan halaman benar-benar siap
        window.addEventListener('DOMContentLoaded', () => {
            loadDataDariCloud();
        }); // <--- Penutup EventListener
    </script>
</body>
</html>
