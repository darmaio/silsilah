<!DOCTYPE html>
<html lang="id">
<head>
    <title>Mengenang Keluarga - Silsilah Mbah Muntari</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4RDDKDQNKB"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-4RDDKDQNKB');
    </script>
    <script src="config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Terapkan di SEMUA file .html yang macet */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            height: auto !important; /* JANGAN gunakan 100% atau 100vh */
            min-height: 100.1% !important; /* Trik agar browser tahu ada konten yang harus di-scroll */
            overflow-x: hidden !important; /* Matikan horizontal yang mengganggu */
            overflow-y: auto !important;   /* Paksa vertikal muncul */
            position: relative !important;
            touch-action: pan-y !important; /* KUNCI: Hanya izinkan scroll vertikal */
            -webkit-overflow-scrolling: touch !important; /* Scroll halus iPhone */
        }

        body { 
            background-color: #fcfcfc; 
            font-family: sans-serif; 
        }
        
        /* Header Merah Marun Khidmat */
        .header-curve {
            background-color: #7f1d1d; /* Merah Marun */
            height: 90px;
            border-bottom-left-radius: 10% 30px;
            border-bottom-right-radius: 10% 30px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .btn-back {
            position: absolute;
            left: 15px;
            top: 35px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        /* Kartu Kenangan - Ditambah Flex */
        .card-kenangan {
            background: white;
            border-radius: 15px;
            padding: 16px;
            margin-bottom: 15px;
            border-left: 5px solid #991b1b;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border-top: 1px solid #f0f0f0;
            border-right: 1px solid #f0f0f0;
            border-bottom: 1px solid #f0f0f0;

            /* INI KUNCINYA */
            display: flex !important;
            justify-content: space-between; /* Teks kiri, foto kanan */
            align-items: center; /* Sejajar tengah secara vertikal */
            gap: 12px;
        }

        /* Biar teks tidak kepotong kalau nama panjang */
        .kenangan-info {
            flex: 1;
            min-width: 0;
        }

        .nama-almarhum {
            font-size: 16px;
            font-weight: bold;
            color: #1f2937;
            margin: 0 0 8px 0;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: #4b5563;
            margin-top: 5px;
        }

        .icon-small { font-size: 14px; }

            /* BAGIAN KANAN (FOTO/SILUET) */
        .kenangan-photo {
            width: 60px; height: 60px; /* Ukuran foto persegi pas */
            border-radius: 12px; /* Lekukan manis */
            object-fit: cover; /* Biar foto tidak gepeng */
            border: 2px solid #eee; /* Bingkai tipis */
            flex-shrink: 0; /* Biar foto tidak mengecil di layar sempit */
        }

        /* SILUET CADANGAN JIKA FOTO KOSONG */
        .siluet-placeholder {
            width: 60px; height: 60px;
            border-radius: 12px;
            background-color: #f3f4f6; /* Abu-abu muda */
            color: #d1d5db; /* Abu-abu tua pudar */
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; /* Ukuran ikon masjid gede */
            border: 2px solid #eee;
        }
    </style>
</head>
<body class="pb-10">

    <div class="bg-red-900 header-curve">
        <button onclick="window.location.href='index.html'" class="btn-back">←</button>
        <h1 class="text-xl font-bold mt-4">Mengenang Keluarga</h1>
        <p class="text-xs opacity-70">Anggota keluarga yang telah wafat.</p>
    </div>

    <div id="listKenangan" class="px-6 space-y-4">
        <p class="text-center text-gray-400 text-sm mt-10">Memuat data...</p>
    </div>

    <script>
        // 1. Fungsi Sinkronisasi (Tarik data jika lokal kosong)
        async function sinkronisasiDataCloud() {
            try {
                console.log("Menarik data kenangan dari Cloud...");
                const response = await fetch(URL_API + "?t=" + Date.now());
                const resJson = await response.json();
                
                if (resJson && resJson.keluarga) {
                    localStorage.setItem('dataCloud', JSON.stringify(resJson));
                    return resJson;
                }
            } catch (err) {
                console.error("Gagal sinkronisasi:", err);
            }
            return null;
        }

        // 2. Fungsi Utama Load Data
        async function loadKenangan() {
            const container = document.getElementById('listKenangan');
            let dataLokalRaw = localStorage.getItem('dataCloud');
            let dataLokal = dataLokalRaw ? JSON.parse(dataLokalRaw) : { keluarga: [] };

            // JIKA DATA KOSONG, TARIK DARI CLOUD
            if (dataLokal.keluarga.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400 text-sm mt-10 animate-pulse">Menghubungkan ke Cloud...</p>';
                const hasilSinkron = await sinkronisasiDataCloud();
                if (hasilSinkron) {
                    dataLokal = hasilSinkron;
                }
            }

            // 3. FILTER: Cari yang wafat
            let wafat = dataLokal.keluarga.filter(person => {
                const nama = (person.nama || "").toLowerCase();
                const status = (person.status || "").toLowerCase();
                // Cek status meninggal atau adanya label (Alm.) di nama
                return status === "meninggal" || status === "wafat" || status === "mati" || nama.includes("(alm") || nama.includes("alm.");
            });

            if (wafat.length === 0) {
                container.innerHTML = `
                    <div class="text-center mt-20">
                        <div class="text-4xl mb-4">📖</div>
                        <p class="text-gray-400 text-sm">Data keluarga yang wafat belum tersedia atau belum ditandai.</p>
                    </div>`;
                return;
            }

            // 4. URUTKAN: Nama A ke Z
            wafat.sort((a, b) => (a.nama || "").localeCompare(b.nama || ""));

            // 5. RENDER HTML
            let html = '';
            wafat.forEach(person => {
                const namaLengkap = person.nama || "";
                let namaBersih = namaLengkap;
                let sebutan = "";

                // Deteksi Alm/Almh untuk pewarnaan label yang lebih halus
                if (namaLengkap.toLowerCase().includes("(almh.)")) {
                    namaBersih = namaLengkap.replace(/\(Almh\.\)/gi, "").trim();
                    sebutan = '<span class="text-pink-800/40 text-[10px] ml-1 font-normal uppercase">(Almh.)</span>';
                } else if (namaLengkap.toLowerCase().includes("(alm.)")) {
                    namaBersih = namaLengkap.replace(/\(Alm\.\)/gi, "").trim();
                    sebutan = '<span class="text-blue-800/40 text-[10px] ml-1 font-normal uppercase">(Alm.)</span>';
                }

                // Logika Foto
                const fotoUrl = person.foto; 
                let mediaHtml = '';
                if (fotoUrl && fotoUrl.length > 20 && !fotoUrl.includes('127.0.0.1')) {
                    mediaHtml = `<img src="${fotoUrl}" alt="${namaBersih}" class="kenangan-photo" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(namaBersih)}&background=f3f4f6&color=d1d5db';">`;
                } else {
                    mediaHtml = `<div class="siluet-placeholder">🕌</div>`;
                }

                const tgl = person.tanggalWafat || "-";
                const makam = person.lokasiMakam || "Tidak tercatat";
                
                html += `
                <div class="card-kenangan shadow-sm">
                    <div class="kenangan-info">
                        <h3 class="nama-almarhum">${namaBersih} ${sebutan}</h3>
                        <div class="mt-2 space-y-1">
                            <div class="info-row">
                                <span class="icon-small text-red-900">📅</span> 
                                <span>Wafat: <b class="text-gray-700">${tgl}</b></span>
                            </div>
                            <div class="info-row italic">
                                <span class="icon-small text-red-900">📍</span> 
                                <span>Makam: ${makam}</span>
                            </div>
                        </div>
                    </div>
                    ${mediaHtml}
                </div>`;
            });

            container.innerHTML = html;
        }

        window.onload = loadKenangan;
    </script>
</body>
</html>
