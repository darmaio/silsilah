    <style>
        .header-curve {

            top: 35px;
            background: rgba(39, 38, 38, 0.2);
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;

            text-decoration: none;

        .input-outline {

        .input-outline:focus { border-color: #00e5ff; border-width: 2px; }
        .input-group { position: relative; margin-bottom: 20px; }
        .profile-pic-container {
            width: 150px;
            height: 150px;
            background-color: #00e5ff;
            border-radius: 50%;

            margin: 30px auto;

            justify-content: center;

        .camera-badge {
            position: absolute;
            top: 5px;
            right: -15px;
            background-color: #00c853;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }
        .btn-simpan {
            background-color: #00e5ff;
            color: white;
            padding: 15px;
            border-radius: 30px;
            font-weight: bold;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-hapus {
            border: 2px solid #ff5252;
            color: #ff5252;
            padding: 15px;
            border-radius: 30px;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body class="bg-white">

    </div>

    <div class="p-6 space-y-5">

        </div>

        <div class="input-group">

                <option value="Kota Magelang">
                <option value="Kab. Magelang">
                <option value="Kota Surakarta">
                <option value="Kab. Boyolali">
                <option value="Kab. Klaten">
                <option value="Kab. Purworejo">
                <option value="Kab. Temanggung">
                <option value="Kab. Wonosobo">
                <option value="Kab. Kebumen">
                <option value="Kab. Banyumas">
                <option value="Kab. Cilacap">
                <option value="Kab. Brebes">
                <option value="Kab. Tegal">
                <option value="Kab. Pemalang">
                <option value="Kab. Pekalongan">
                <option value="Kab. Batang">
                <option value="Kab. Kendal">
                <option value="Kab. Demak">
                <option value="Kab. Kudus">
                <option value="Kab. Jepara">
                <option value="Kab. Pati">
                <option value="Kab. Rembang">
                <option value="Kab. Blora">
                <option value="Kab. Grobogan">
                <option value="Kab. Sragen">
                <option value="Kab. Karanganyar">
                <option value="Kab. Sukoharjo">
                <option value="Kab. Wonogiri">

                <option value="Kota Surabaya">
                <option value="Kota Malang">
                <option value="Kab. Malang">
                <option value="Kota Kediri">
                <option value="Kab. Kediri">
                <option value="Kota Madiun">
                <option value="Kab. Madiun">
                <option value="Kab. Pacitan">
                <option value="Kab. Ponorogo">
                <option value="Kab. Trenggalek">
                <option value="Kab. Tulungagung">
                <option value="Kab. Blitar">
                <option value="Kab. Nganjuk">
                <option value="Kab. Jombang">
                <option value="Kab. Mojokerto">
                <option value="Kab. Sidoarjo">
                <option value="Kab. Gresik">
                <option value="Kab. Lamongan">
                <option value="Kab. Tuban">

                <option value="Kab. Ngawi">

                <option value="Kota Bandung">

                <option value="Kota Bekasi">
                <option value="Kab. Bekasi">
                <option value="Kota Bogor">
                <option value="Kab. Bogor">

        <div class="input-group relative">

        </div>

                <option value="pasangan">Pasangan (Suami/Istri) dari...</option>

            </select>
        </div>

        <div id="groupRelasi" class="input-group hidden">
            <label class="text-xs text-gray-500 ml-2">Anak dari... atau Pasangan (Suami/Istri) dari... :</label>
            <input type="text" id="inputCariParent" list="daftarKeluargaCari" class="input-outline bg-white" placeholder="Ketik nama orang tua...">

        </div>

        <datalist id="daftarKeluargaCari"></datalist>

        <div class="profile-pic-container">
            <img id="profilePreview" src="" class="hidden w-full h-full rounded-full object-cover border-4 border-white shadow-sm">

                <svg width="80" height="80" viewBox="0 0 24 24" fill="white">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
            </div>
            <div class="camera-badge cursor-pointer" onclick="document.getElementById('fileInput').click()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                    <path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>
                </svg>
            </div>
            <input type="file" id="fileInput" accept="image/*" class="hidden">
        </div> 

        <button type="button" id="btnSimpan" onclick="simpanAnggota()" class="btn-simpan active:scale-95 transition-transform">
            SIMPAN DATA KE MEMORI
        </button>

        <button type="button" id="btnHapus" onclick="hapusAnggota()" class="btn-hapus hidden active:scale-95 transition-transform">
            HAPUS ANGGOTA
        </button>
    </div>

    <script src="config.js"></script> 
    <script>
        // 1. Ambil Parameter ID dari URL
        const urlParams = new URLSearchParams(window.location.search);
        const idAnggotaUrl = urlParams.get('id');

        // 2. Fungsi Ambil Data & Isi Form (Mode Edit)
        function cekModeEdit() {
            if (!idAnggotaUrl) return; 

            const dataRaw = localStorage.getItem('dataCloud');
            if (dataRaw) {
                const resJson = JSON.parse(dataRaw);
                const daftarKeluarga = resJson.keluarga || [];
                
                // PERBAIKAN: Gunakan dua kali tanda sama dengan (==) agar angka 10 sama dengan teks "10"
                // Dan kita pastikan id di-trim jika itu teks
                const anggota = daftarKeluarga.find(a => String(a.id).trim() == String(idAnggotaUrl).trim());

                if (anggota) {
                    console.log("Data ditemukan:", anggota.nama);
                    
                    // Isi Nama
                    const elNama = document.getElementById('namaLengkap');
                    if(elNama) elNama.value = anggota.nama || "";

                    // Isi Alamat/Domisili
                    const elDomisili = document.getElementById('domisili');
                    if(elDomisili) elDomisili.value = anggota.domisili || "";
                    
                    // Ganti Judul Header
                    const judulHalaman = document.querySelector('.header-curve h1');
                    if(judulHalaman) judulHalaman.innerText = "Edit Anggota";

                    // Tampilkan Foto jika ada
                    if (anggota.foto && anggota.foto.length > 20) {
                        const previewImage = document.getElementById('previewImage');
                        const defaultIcon = document.getElementById('defaultIcon');
                        previewImage.src = anggota.foto;
                        previewImage.classList.remove('hidden');
                        defaultIcon.classList.add('hidden');
                    }
                } else {
                    console.error("ID tidak ditemukan di daftar keluarga:", idAnggotaUrl);
                }
            } else {
                console.error("Gudang data (dataCloud) kosong di storage.");
            }
        }

        // 3. Fungsi Kapitalisasi Otomatis (RT/RW/Romawi)
        function buatKapital(str) {
            let hasil = str.replace(/\b\w/g, char => char.toUpperCase());
            const singkatanWajib = ["Rt", "Rw", "Diy", "Ii", "Iii", "Iv", "Vi", "Vii", "Viii", "Ix", "Xi", "Xii"];
            singkatanWajib.forEach(kata => {
                const regex = new RegExp("\\b" + kata + "\\b", "gi");
                hasil = hasil.replace(regex, kata.toUpperCase());
            });
            return hasil;
        }

        // 4. Inisialisasi saat Halaman Siap
        document.addEventListener('DOMContentLoaded', () => {
            cekModeEdit();

            // Pasang Listener Kapitalisasi
            const inputNama = document.getElementById('namaLengkap');
            const inputAlamat = document.getElementById('domisili');

            [inputNama, inputAlamat].forEach(input => {
                if (input) {
                    input.addEventListener('input', function() {
                        const start = this.selectionStart;
                        this.value = buatKapital(this.value);
                        this.setSelectionRange(start, start);
                    });
                }
            });
        });

        // 5. Tombol Kembali
        document.getElementById('btnBack').addEventListener('click', () => {
            if (idAnggotaUrl) {
                window.location.href = 'cari-anggota.html';
            } else {
                window.location.href = 'index.html';
            }
        });

        // 6. Logika Upload Foto (Kompresi)
        document.getElementById('fotoAnggota').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = 300; 
                        let height = (img.height / img.width) * width;
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                        document.getElementById('previewImage').src = dataUrl;
                        document.getElementById('previewImage').classList.remove('hidden');
                        document.getElementById('defaultIcon').classList.add('hidden');
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
