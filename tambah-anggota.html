<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .header-curve {
            background-color: #00e5ff;
            height: 90px;
            border-bottom-left-radius: 10% 30px;
            border-bottom-right-radius: 10% 30px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .btn-back {
            position: absolute;
            left: 20px;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            outline: none;
        }        
        .input-outline {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 12px;
            width: 100%;
            outline: none;
        }
        .input-outline:focus { border-color: #00e5ff; border-width: 2px; }
        .input-group { position: relative; margin-bottom: 20px; }
        .profile-pic-container {
            width: 150px;
            height: 150px;
            background-color: #00e5ff;
            border-radius: 50%;
            position: relative;
            margin: 30px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .camera-badge {
            position: absolute;
            top: 5px;
            right: -15px;
            background-color: #00c853;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }
        .btn-simpan {
            background-color: #00e5ff;
            color: white;
            padding: 15px;
            border-radius: 30px;
            font-weight: bold;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-hapus {
            border: 2px solid #ff5252;
            color: #ff5252;
            padding: 15px;
            border-radius: 30px;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body class="bg-white">

    <div class="header-curve">
        <button onclick="window.history.back()" class="btn-back">←</button>
        <h1 id="judulHalaman" class="text-xl font-bold">Tambah Anggota</h1>
    </div>

    <div class="p-6 space-y-5">
        
        <div class="input-group">
            <input type="text" id="namaLengkap" placeholder="Nama Lengkap" class="input-outline">
        </div>

        <div class="input-group">
            <select id="tempatLahir" class="input-outline bg-white">
                <option value="" disabled selected>Tempat Lahir</option>
                <option value="Kabupaten Magelang">Kabupaten Magelang</option>
                <option value="Yogyakarta">Yogyakarta</option>
            </select>
        </div>

        <div class="input-group relative">
            <input type="date" id="tanggalLahir" class="input-outline">
            <span class="absolute right-4 top-3 text-xl">📅</span>
        </div>

        <div class="input-group">
            <textarea id="domisili" placeholder="Domisili" rows="4" class="input-outline"></textarea>
        </div>

        <div class="input-group">
            <label class="text-xs text-gray-500 ml-2">Hubungan Sebagai:</label>
            <select id="statusKekerabatan" class="input-outline bg-white">
                <option value="none">Kepala Keluarga / Orang Tua Utama</option>
                <option value="pasangan">Pasangan (Suami/Istri) dari...</option>
                <option value="anak">Anak dari...</option>
            </select>
        </div>

        <div id="groupRelasi" class="input-group hidden">
            <label class="text-xs text-gray-500 ml-2">Terhubung Dengan:</label>
            <select id="parentID" class="input-outline bg-white">
                <option value="">-- Pilih Anggota Keluarga --</option>
            </select>
        </div>

        <div class="mb-4" id="groupPasangan">
            <label class="block text-gray-600 text-sm font-semibold mb-2">Pilih Pasangan (Suami/Istri)</label>
            <select id="idPasangan" class="w-full p-4 bg-gray-50 rounded-xl border border-gray-100 outline-none focus:border-[#00e5ff] appearance-none text-gray-700">
                <option value="">-- Tidak ada / Belum dipilih --</option>
                </select>
            <p class="text-[10px] text-gray-400 mt-1 italic">*Jika pasangan belum terdaftar, simpan dulu orang ini, lalu edit kembali setelah pasangan diinput.</p>
        </div>

        <div class="profile-pic-container">
            <img id="profilePreview" src="" class="hidden w-full h-full rounded-full object-cover border-4 border-white shadow-sm">
            <div id="defaultIcon">
                <svg width="80" height="80" viewBox="0 0 24 24" fill="white">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
            </div>
            <div class="camera-badge cursor-pointer" onclick="document.getElementById('fileInput').click()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                    <path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>
                </svg>
            </div>
            <input type="file" id="fileInput" accept="image/*" class="hidden">
        </div> 

        <button type="button" id="btnSimpan" onclick="simpanAnggota()" class="btn-simpan active:scale-95 transition-transform">
            SIMPAN DATA KE MEMORI
        </button>

        <button type="button" id="btnHapus" onclick="hapusAnggota()" class="btn-hapus hidden active:scale-95 transition-transform">
            HAPUS ANGGOTA
        </button>
    </div>

    <script src="config.js"></script> <script>
        const fileInput = document.getElementById('fileInput');
        const previewImage = document.getElementById('profilePreview'); // Gunakan ini secara konsisten
        const defaultIcon = document.getElementById('defaultIcon');
        const statusSelect = document.getElementById('statusKekerabatan');
        const groupRelasi = document.getElementById('groupRelasi');
        const parentSelect = document.getElementById('parentID');
        
        const urlParams = new URLSearchParams(window.location.search);
        const idAnggotaEdit = urlParams.get('id');

        window.onload = function() {
            // Muat opsi keluarga dulu agar dropdown terisi
            muatOpsiKeluarga();

            if (idAnggotaEdit) {
                document.getElementById('judulHalaman').innerText = "Edit Anggota";
                document.getElementById('btnSimpan').innerText = "SIMPAN PERUBAHAN";
                document.getElementById('btnHapus').classList.remove('hidden');
                muatDataUntukEdit(idAnggotaEdit);
            }
        };

        statusSelect.addEventListener('change', function() {
            if (this.value !== 'none') {
                groupRelasi.classList.remove('hidden');
            } else {
                groupRelasi.classList.add('hidden');
            }
        });

        function muatOpsiKeluarga() {
            const daftar = JSON.parse(localStorage.getItem('daftarKeluarga')) || [];
            parentSelect.innerHTML = '<option value="">-- Pilih Anggota Keluarga --</option>';
            daftar.forEach(a => {
                if (a.id != idAnggotaEdit) {
                    parentSelect.innerHTML += `<option value="${a.id}">${a.nama}</option>`;
                }
            });
        }

        function muatDataUntukEdit(id) {
            isiDaftarPasangan(id); // Isi dulu daftar namanya

            const daftar = JSON.parse(localStorage.getItem('daftarKeluarga')) || [];
            const data = daftar.find(a => a.id == id);

            if (data) {
                document.getElementById('namaLengkap').value = data.nama || "";
                document.getElementById('domisili').value = data.domisili || "";
                document.getElementById('tempatLahir').value = data.tempatLahir || "";
                document.getElementById('tanggalLahir').value = data.tanggalLahir || "";
                document.getElementById('idPasangan').value = data.idPasangan || ""; // Ambil ID Pasangan
                
                statusSelect.value = data.status || "none";
                if (statusSelect.value !== 'none') {
                    groupRelasi.classList.remove('hidden');
                    parentSelect.value = data.parentID || "";
                }

                if (data.foto && data.foto !== "") {
                    previewImage.src = data.foto;
                    previewImage.classList.remove('hidden');
                    defaultIcon.classList.add('hidden');
                }
            }
        }

        function isiDaftarPasangan(idSekarang) {
            const daftar = JSON.parse(localStorage.getItem('daftarKeluarga')) || [];
            const selectPasangan = document.getElementById('idPasangan');
            
            // Kosongkan dulu kecuali opsi pertama
            selectPasangan.innerHTML = '<option value="">-- Tidak ada / Belum dipilih --</option>';

            daftar.forEach(anggota => {
                // Jangan tampilkan diri sendiri di daftar pilihan pasangan
                if (anggota.id != idSekarang) {
                    let option = document.createElement('option');
                    option.value = anggota.id;
                    option.text = anggota.nama;
                    selectPasangan.appendChild(option);
                }
            });
        }

        async function simpanAnggota() {
            const currentId = idAnggotaEdit ? idAnggotaEdit : Date.now().toString();

            // --- PERBAIKAN LOGIKA FOTO ---
            let fotoFinal = "";

            // Kita cek: Apakah previewImage punya isi, dan apakah isinya format DATA (bukan link HTTP)
            if (!previewImage.classList.contains('hidden') && previewImage.src && previewImage.src.startsWith('data:image')) {
                // Jika user sudah upload foto, previewImage.src akan berisi "data:image/jpeg;base64,..."
                fotoFinal = previewImage.src; 
            } else {
                // Jika belum upload, atau isinya masih link website (http...), paksa simpan SVG biru tosca
                fotoFinal = `data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'><rect width='24' height='24' fill='%2300e5ff'/><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>`;
            }

            const dataBaru = {
                id: currentId,
                nama: document.getElementById('namaLengkap').value,
                parentID: document.getElementById('parentID').value,
                status: document.getElementById('statusKekerabatan').value,
                domisili: document.getElementById('domisili').value,
                foto: fotoFinal,
                idPasangan: document.getElementById('idPasangan').value, // DATA PENTING BARU 
                tempatLahir: document.getElementById('tempatLahir').value,
                tanggalLahir: document.getElementById('tanggalLahir').value
            };

            if (!dataBaru.nama) {
                alert("Nama harus diisi!");
                return;
            }

            // --- LANJUTKAN PROSES SIMPAN SEPERTI BIASA ---
            let daftar = JSON.parse(localStorage.getItem('daftarKeluarga')) || [];
            const index = daftar.findIndex(a => a.id == currentId);
            if (index > -1) daftar[index] = dataBaru; else daftar.push(dataBaru);
            localStorage.setItem('daftarKeluarga', JSON.stringify(daftar));

            try {
                document.getElementById('btnSimpan').innerText = "MENGIRIM...";
                document.getElementById('btnSimpan').disabled = true;

                await fetch(URL_API, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dataBaru)
                });
                
                alert("Data Berhasil Disinkronkan!");
                window.location.href = 'index.html';
            } catch (e) {
                alert("Tersimpan di HP, gagal sinkron Cloud.");
                window.location.href = 'index.html';
            }
        }

        async function hapusAnggota() {
            if (confirm("Yakin mau hapus data ini dari HP dan Cloud Google Sheets?")) {
                const idTerpilih = idAnggotaEdit;

                // 1. Tampilkan Loading
                const btnHapus = document.getElementById('btnHapus');
                btnHapus.innerText = "MENGHAPUS DI CLOUD...";
                btnHapus.disabled = true;

                try {
                    // 2. Kirim perintah hapus ke Google Sheets
                    await fetch(URL_API, {
                        method: 'POST',
                        mode: 'no-cors', // Penting untuk Google Apps Script
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            action: "delete", 
                            id: idTerpilih 
                        })
                    });

                    // 3. Hapus dari memori Lokal (HP)
                    let daftar = JSON.parse(localStorage.getItem('daftarKeluarga')) || [];
                    daftar = daftar.filter(a => a.id != idTerpilih);
                    localStorage.setItem('daftarKeluarga', JSON.stringify(daftar));

                    alert("Data berhasil dihapus dari HP dan Cloud!");
                    window.location.href = 'cari-anggota.html';

                } catch (e) {
                    console.error(e);
                    alert("Gagal hapus di Cloud. Cek internet Om.");
                    btnHapus.innerText = "HAPUS ANGGOTA";
                    btnHapus.disabled = false;
                }
            }
        }

        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    // PROSES KOMPRESI DIMULAI
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 400; // Ukuran cukup untuk profil silsilah
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // Ubah ke format JPEG dengan kualitas 70% agar file sangat ringan
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                        
                        previewImage.src = dataUrl;
                        previewImage.classList.remove('hidden');
                        defaultIcon.classList.add('hidden');
                        
                        console.log("Foto berhasil dikompres!");
                    };
                };
                reader.readAsDataURL(file);
            }
        });

        function buatKapital(teks) {
            // 1. Standar dulu: kapital awal kata (misal: "rt. 02" -> "Rt. 02")
            let hasil = teks.toLowerCase().replace(/\b\w/g, char => char.toUpperCase());

            // 2. Daftar kata yang WAJIB huruf besar semua (Singkatan & Romawi)
            const singkatanWajib = ["Rt", "Rw", "Diy", "Ii", "Iii", "Iv", "Vi", "Vii", "Viii", "Ix", "Xi", "Xii"];
            
            // 3. Kita sapu bersih kata yang salah tadi
            singkatanWajib.forEach(kata => {
                // \b artinya batas kata, supaya kalau ada nama "Arti" tidak berubah jadi "ARTi"
                const regex = new RegExp("\\b" + kata + "\\b", "gi");
                
                // Kita paksa jadi huruf besar semua (RT, RW, DIY, II, dst)
                hasil = hasil.replace(regex, kata.toUpperCase());
            });

            return hasil;
        }

        // Ganti bagian ini ya Om, perhatikan ID 'namaLengkap'
        const inputNama = document.getElementById('namaLengkap'); // Tadi Om tulis 'nama'
        const inputAlamat = document.getElementById('domisili');

        [inputNama, inputAlamat].forEach(input => {
            if (input) {
                input.addEventListener('input', function() {
                    // Simpan posisi kursor agar tidak loncat
                    const start = this.selectionStart;
                    
                    // Ubah teks jadi Kapital di Awal Kata
                    this.value = this.value.toLowerCase().replace(/\b\w/g, char => char.toUpperCase());
                    
                    // Kembalikan posisi kursor
                    this.setSelectionRange(start, start);
                });
            }
        });

    </script>
</body>
</html>
