<!DOCTYPE html>
<html lang="id">
<head>
    <title>Cari Anggota - Silsilah Mbah Muntari</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4RDDKDQNKB"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-4RDDKDQNKB');
    </script>
    <script src="config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .header-curve {
            background: linear-gradient(135deg, #00e5ff 0%, #00acc1 100%);
            height: 90px;
            border-bottom-left-radius: 10% 30px;
            border-bottom-right-radius: 10% 30px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .btn-back {
            position: absolute;
            left: 15px;
            top: 35px;
            background: rgba(39, 38, 38, 0.2);
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        .search-container {
            margin-top: 20px;
            padding: 0 24px;
        }
        .search-input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 25px;
            border: 1px solid #e0e0e0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            outline: none;
        }
        .search-input:focus {
            border-color: #00e5ff;
        }
        .member-card {
            display: flex;
            align-items: center;
            padding: 12px;
            background: white;
            border-radius: 15px;
            margin-bottom: 12px;
            border: 1px solid #f0f0f0;
            transition: transform 0.2s;
        }
        .member-card:active {
            transform: scale(0.98);
            background-color: #f9f9f9;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="header-curve">
        <button id="btnBack" class="btn-back">←</button>
        <h1 class="text-xl font-bold">Cari Anggota</h1>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Cari nama anggota keluarga..." class="search-input">
        <div id="statusPencarian" class="text-center mt-3 text-[11px] text-cyan-600 font-bold hidden">
            <i class="fas fa-spinner fa-spin mr-1"></i> Sedang memeriksa daftar anggota...
        </div>
    </div>

    <div id="wadahDaftar" class="p-6 mt-2">
        </div>

     
    <script src="config.js"></script>
    <script>
        let dataSiap = false;
        let timeoutPencarian = null;

        document.getElementById('btnBack').addEventListener('click', () => {
            window.location.href = 'index.html';
        });
        
        // 1. Fungsi Ambil Data: Lebih kuat dalam mendeteksi struktur JSON
        function getDaftarDariStorage() {
            try {
                const dataRaw = localStorage.getItem('dataCloud');
                if (dataRaw) {
                    const parsed = JSON.parse(dataRaw);
                    // Cek apakah datanya ada di dalam properti 'keluarga' atau langsung array
                    return parsed.keluarga || (Array.isArray(parsed) ? parsed : []); 
                }
            } catch (e) {
                console.error("Gagal baca storage:", e);
            }
            return [];
        }

        // 2. Fungsi Utama: Pastikan data benar-benar ada sebelum bisa diketik
        async function muatDaftarAnggota() {
            const wadahDaftar = document.getElementById('wadahDaftar');
            const inputCari = document.getElementById('searchInput');
            
            let daftarKeluarga = getDaftarDariStorage();

            // Jika masih kosong, coba tarik dari Cloud (Sync ulang)
            if (daftarKeluarga.length === 0) {
                console.log("Data kosong, mencoba tarik dari Cloud...");
                inputCari.disabled = true;
                inputCari.placeholder = "Menghubungkan ke pusat...";
                
                wadahDaftar.innerHTML = `
                    <div class="text-center mt-12 px-6">
                        <p class="text-cyan-500 font-bold animate-bounce text-sm">
                           <i class="fas fa-cloud-download-alt mr-2"></i> Mengabsen Anggota...
                        </p>
                    </div>`;
                
                await sinkronisasiDataCloud();
                daftarKeluarga = getDaftarDariStorage();
            }

            if (daftarKeluarga.length > 0) {
                dataSiap = true;
                inputCari.disabled = false;
                inputCari.placeholder = "Cari nama anggota keluarga...";
                renderData(daftarKeluarga);
            } else {
                wadahDaftar.innerHTML = `<div class="text-center mt-12 text-gray-400">Data gagal dimuat. Coba kembali ke Beranda dulu Om.</div>`;
            }
        }

        async function sinkronisasiDataCloud() {
            try {
                const response = await fetch(URL_API + "?t=" + Date.now());
                const resJson = await response.json();
                if (resJson && (resJson.keluarga || Array.isArray(resJson))) {
                    localStorage.setItem('dataCloud', JSON.stringify(resJson));
                    console.log("Sinkronisasi Berhasil!");
                }
            } catch (err) {
                console.error("Gagal sinkronisasi:", err);
            }
        }

        function renderData(data, isSearching = false) {
            const wadahDaftar = document.getElementById('wadahDaftar');
            
            // Jika kotak pencarian kosong (isSearching false), tampilkan semua data yang ada
            if (!isSearching && (!data || data.length === 0)) {
                wadahDaftar.innerHTML = `<div class="text-center mt-12"><p class="text-gray-400">Memuat data...</p></div>`;
                return;
            }

            // Jika sedang mencari tapi tidak ketemu
            if (isSearching && data.length === 0) {
                wadahDaftar.innerHTML = `<p class="text-center text-gray-400 mt-10 italic">Nama tidak ditemukan.</p>`;
                return;
            }

            const dataTerurut = [...data].sort((a, b) => (a.nama || "").localeCompare(b.nama || ""));
            const htmlKartu = dataTerurut.map(anggota => {
                let sumberFoto = anggota.foto;
                if (!sumberFoto || sumberFoto.length < 20) {
                    sumberFoto = `https://ui-avatars.com/api/?name=${encodeURIComponent(anggota.nama)}&background=00e5ff&color=fff`;
                }
                // Pastikan 'id' ada di Google Sheet Om, jika tidak ada gunakan 'nama' sebagai ID sementara
                const idAnggota = anggota.id || encodeURIComponent(anggota.nama);
                
                return `
                    <div class="member-card shadow-sm flex items-center p-4 bg-white mb-3 rounded-2xl border border-gray-100" 
                        onclick="window.location.href='tambah-anggota.html?id=${idAnggota}'">
                        <img src="${sumberFoto}" class="w-14 h-14 rounded-full object-cover border-2 border-[#00e5ff] mr-4">
                        <div class="flex-1">
                            <h4 class="font-bold text-gray-800 text-md leading-tight">${anggota.nama}</h4>
                            <p class="text-xs text-gray-400 mt-1 italic">📍 ${anggota.domisili || 'Lokasi tidak diisi'}</p>
                        </div>
                        <div class="text-gray-300 ml-2">❯</div>
                    </div>`;
            }).join('');

            wadahDaftar.innerHTML = htmlKartu; 
        }

        function filterAnggota() {
            const inputElemen = document.getElementById('searchInput');
            const statusElemen = document.getElementById('statusPencarian');
            const input = inputElemen.value.toLowerCase().trim();
            
            // Jika kosong, langsung tampilkan semua tanpa delay
            if (input.length === 0) {
                if (statusElemen) statusElemen.classList.add('hidden');
                renderData(getDaftarDariStorage(), false);
                return;
            }

            if (statusElemen) statusElemen.classList.remove('hidden');

            clearTimeout(timeoutPencarian);
            timeoutPencarian = setTimeout(() => {
                const daftarKeluarga = getDaftarDariStorage();
                const hasilFilter = daftarKeluarga.filter(anggota => {
                    const nama = (anggota.nama || "").toLowerCase();
                    const domisili = (anggota.domisili || "").toLowerCase();
                    return nama.includes(input) || domisili.includes(input);
                });

                if (statusElemen) statusElemen.classList.add('hidden');
                renderData(hasilFilter, true);
            }, 300); 
        }

        document.getElementById('searchInput').addEventListener('input', filterAnggota);
        document.addEventListener('DOMContentLoaded', () => {
            muatDaftarAnggota();
        });
    </script>
</body>
</html>
