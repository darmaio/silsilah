<!DOCTYPE html>
<html lang="id">
<head>
    <title>Cari Anggota - Silsilah Mbah Muntari</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4RDDKDQNKB"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-4RDDKDQNKB');
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .header-curve {
            background: linear-gradient(135deg, #00e5ff 0%, #00acc1 100%);
            height: 90px;
            border-bottom-left-radius: 10% 30px;
            border-bottom-right-radius: 10% 30px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .btn-back {
            position: absolute;
            left: 15px;
            top: 35px;
            background: rgba(39, 38, 38, 0.2);
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        .search-container {
            margin-top: 20px;
            padding: 0 24px;
        }
        .search-input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 25px;
            border: 1px solid #e0e0e0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            outline: none;
        }
        .search-input:focus {
            border-color: #00e5ff;
        }
        .member-card {
            display: flex;
            align-items: center;
            padding: 12px;
            background: white;
            border-radius: 15px;
            margin-bottom: 12px;
            border: 1px solid #f0f0f0;
            transition: transform 0.2s;
        }
        .member-card:active {
            transform: scale(0.98);
            background-color: #f9f9f9;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="header-curve">
        <button id="btnBack" class="btn-back">←</button>
        <h1 class="text-xl font-bold">Cari Anggota</h1>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Cari nama anggota keluarga..." class="search-input">
    </div>

    <div id="wadahDaftar" class="p-6 mt-2">
        </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Cari nama anggota keluarga..." class="search-input">
        <div id="statusPencarian" class="text-center mt-2 text-[10px] text-cyan-600 font-bold hidden"></div>
    </div>

    <script src="config.js"></script> <script>
        document.getElementById('btnBack').addEventListener('click', () => {
            window.location.href = 'index.html';
        });
        
        // 1. Fungsi Pembantu: Ambil data dari localStorage
        function getDaftarDariStorage() {
            const dataRaw = localStorage.getItem('dataCloud');
            if (dataRaw) {
                const parsed = JSON.parse(dataRaw);
                return parsed.keluarga || []; 
            }
            return [];
        }

        // 2. Fungsi Utama: Cek lokal dulu, kalau kosong tarik dari Cloud
        async function muatDaftarAnggota() {
            const wadahDaftar = document.getElementById('wadahDaftar');
            let daftarKeluarga = getDaftarDariStorage();

            // Jika data benar-benar kosong di memori HP
            if (daftarKeluarga.length === 0) {
                wadahDaftar.innerHTML = `
                    <div class="text-center mt-12 px-6">
                        <p class="text-cyan-500 font-bold animate-bounce text-sm">
                           <i class="fas fa-cloud-download-alt mr-2"></i> Menghubungkan ke Google Sheets...
                        </p>
                    </div>`;
                
                await sinkronisasiDataCloud();
                daftarKeluarga = getDaftarDariStorage();
            }

            renderData(daftarKeluarga);
        }

        // 3. Fungsi Sinkronisasi (Darurat jika localStorage kosong)
        async function sinkronisasiDataCloud() {
            try {
                console.log("Mencoba tarik data dari Cloud...");
                const response = await fetch(URL_API + "?t=" + Date.now());
                const resJson = await response.json();
                
                if (resJson && resJson.keluarga) {
                    localStorage.setItem('dataCloud', JSON.stringify(resJson));
                    console.log("Sinkronisasi berhasil!");
                }
            } catch (err) {
                console.error("Gagal sinkronisasi:", err);
            }
        }

        // 4. Fungsi Render: Tampilkan Kartu
        function renderData(data, isSearching = false) {
            const wadahDaftar = document.getElementById('wadahDaftar');
            
            if (!data || (data.length === 0 && !isSearching)) {
                wadahDaftar.innerHTML = `
                    <div class="text-center mt-12 px-6">
                        <div class="bg-red-50 p-6 rounded-2xl border-2 border-dashed border-red-200">
                            <p class="text-gray-500 italic">Data tidak ditemukan atau koneksi internet bermasalah.</p>
                            <button onclick="location.reload()" class="bg-red-500 text-white px-4 py-2 rounded-xl mt-3 text-sm">Coba Lagi</button>
                        </div>
                    </div>`;
                return;
            }

            if (data.length === 0 && isSearching) {
                wadahDaftar.innerHTML = `
                    <div class="text-center mt-12 px-6">
                        <p class="text-gray-400 italic text-sm">Nama atau lokasi tidak ditemukan.</p>
                    </div>`;
                return;
            }

            // Urutkan Nama A-Z
            const dataTerurut = [...data].sort((a, b) => (a.nama || "").localeCompare(b.nama || ""));

            // Gunakan Map + Join agar render di HP jauh lebih ringan dan cepat
            const htmlKartu = dataTerurut.map(anggota => {
                let sumberFoto = anggota.foto;
                if (!sumberFoto || sumberFoto === "null" || sumberFoto === "" || sumberFoto.length < 20) {
                    sumberFoto = `https://ui-avatars.com/api/?name=${encodeURIComponent(anggota.nama)}&background=00e5ff&color=fff`;
                }

                let infoLahir = (anggota.tempatLahir || anggota.tanggalLahir) 
                    ? `${anggota.tempatLahir || ''}, ${anggota.tanggalLahir || ''}`
                    : "Data kelahiran belum diisi";

                return `
                    <div class="member-card shadow-sm cursor-pointer hover:bg-gray-50 flex items-center p-4 bg-white mb-3 rounded-2xl border border-gray-100" 
                        onclick="window.location.href='tambah-anggota.html?id=${anggota.id}'">
                        <img src="${sumberFoto}" class="w-14 h-14 rounded-full object-cover border-2 border-[#00e5ff] shadow-sm mr-4">
                        <div class="flex-1">
                            <h4 class="font-bold text-gray-800 text-md leading-tight">${anggota.nama}</h4>
                            <p class="text-[10px] text-[#00e5ff] font-semibold mt-0.5 uppercase tracking-wide">${infoLahir}</p>
                            <p class="text-xs text-gray-400 mt-1 italic leading-tight">📍 ${anggota.domisili || 'Lokasi tidak diisi'}</p>
                        </div>
                        <div class="text-gray-300 ml-2">❯</div>
                    </div>`;
            }).join('');

            wadahDaftar.innerHTML = htmlKartu; 
        }

        // 5. Fitur Cari
        let timeoutPencarian = null;

        function filterAnggota() {
            const inputElemen = document.getElementById('searchInput');
            const statusElemen = document.getElementById('statusPencarian');
            const input = inputElemen.value.toLowerCase().trim();
            
            // Tampilkan status "Sedang memeriksa"
            if (input.length > 0) {
                statusElemen.innerHTML = `<i class="fas fa-spinner fa-spin mr-1"></i> Sedang memeriksa daftar anggota...`;
                statusElemen.classList.remove('hidden');
            } else {
                statusElemen.classList.add('hidden');
                const daftarKeluarga = getDaftarDariStorage();
                renderData(daftarKeluarga, false);
                return;
            }

            // Hapus timeout sebelumnya (Debounce) agar tidak berat di HP
            clearTimeout(timeoutPencarian);

            // Beri jeda 300ms sebelum mulai mencari
            timeoutPencarian = setTimeout(() => {
                const daftarKeluarga = getDaftarDariStorage();
                
                const hasilFilter = daftarKeluarga.filter(anggota => {
                    const nama = (anggota.nama || "").toLowerCase();
                    const domisili = (anggota.domisili || "").toLowerCase();
                    return nama.includes(input) || domisili.includes(input);
                });

                // Sembunyikan status setelah selesai
                statusElemen.classList.add('hidden');
                
                // Tampilkan hasil
                renderData(hasilFilter, true);
            }, 300); 
        }

        // Tambahkan ini di bagian bawah script agar lebih peka di HP
        document.getElementById('searchInput').addEventListener('input', filterAnggota);

        // Jalankan saat halaman dibuka
        // Jalankan saat dokumen siap
        document.addEventListener('DOMContentLoaded', () => {
            muatDaftarAnggota();
        });
    </script>
</body>
</html>
