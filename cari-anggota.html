<!DOCTYPE html>
<html lang="id">
<head>
    <title>Cari Anggota - Silsilah Mbah Muntari</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4RDDKDQNKB"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-4RDDKDQNKB');
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .header-curve {
            background: linear-gradient(135deg, #00e5ff 0%, #00acc1 100%);
            height: 90px;
            border-bottom-left-radius: 10% 30px;
            border-bottom-right-radius: 10% 30px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .btn-back {
            position: absolute; left: 15px; top: 35px;
            background: rgba(39, 38, 38, 0.2);
            border-radius: 50%; width: 35px; height: 35px;
            display: flex; align-items: center; justify-content: center;
            color: white; text-decoration: none; font-weight: bold;
        }
        .search-input {
            width: 100%; padding: 12px 20px; border-radius: 25px;
            border: 1px solid #e0e0e0; outline: none; transition: 0.3s;
        }
        .search-input:focus { border-color: #00e5ff; box-shadow: 0 0 10px rgba(0,229,255,0.1); }
        .member-card {
            display: flex; align-items: center; padding: 12px;
            background: white; border-radius: 15px; margin-bottom: 12px;
            border: 1px solid #f0f0f0; transition: transform 0.2s;
        }
        .member-card:active { transform: scale(0.98); background-color: #f9f9f9; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="header-curve">
        <button onclick="window.location.href='index.html'" class="btn-back">←</button>
        <h1 class="text-xl font-bold">Cari Anggota</h1>
    </div>

    <div class="mt-5 px-6">
        <input type="text" id="searchInput" oninput="filterAnggota()" placeholder="Ketik nama (Agus, Andi, dll)..." class="search-input">
    </div>

    <div id="wadahDaftar" class="p-6 mt-2">
        </div>

    <script src="config.js"></script> 
    <script>
        // 1. Ambil data dengan proteksi tipe data
        function getDaftarDariStorage() {
            try {
                const dataRaw = localStorage.getItem('dataCloud');
                if (!dataRaw) return [];
                const parsed = JSON.parse(dataRaw);
                // Pastikan yang diambil adalah array
                return Array.isArray(parsed.keluarga) ? parsed.keluarga : [];
            } catch (e) {
                console.error("Error ambil storage:", e);
                return [];
            }
        }

        // 2. Fungsi Render (Anti-Blank)
        function renderData(data, sedangMencari = false) {
            const wadahDaftar = document.getElementById('wadahDaftar');
            const inputKetik = document.getElementById('searchInput').value.trim();

            // Jika sedang tidak mencari tapi data kosong, tampilkan pesan sinkron
            if (!sedangMencari && (!data || data.length === 0)) {
                wadahDaftar.innerHTML = `
                    <div class="text-center mt-12 px-6">
                        <div class="bg-red-50 p-6 rounded-2xl border-2 border-dashed border-red-200">
                            <p class="text-gray-500 italic">Data belum sinkron.</p>
                            <button onclick="location.reload()" class="bg-red-500 text-white px-4 py-2 rounded-xl mt-3 text-sm">Sinkron Sekarang</button>
                        </div>
                    </div>`;
                return;
            }

            // Jika sedang mencari dan tidak ada hasil
            if (sedangMencari && (!data || data.length === 0)) {
                wadahDaftar.innerHTML = `
                    <div class="text-center mt-12 px-6">
                        <p class="text-gray-400 italic">Nama "${inputKetik}" tidak ditemukan.</p>
                    </div>`;
                return;
            }

            // Tampilkan Data
            wadahDaftar.innerHTML = ''; 
            // Tambahkan proteksi pada sort
            const dataTerurut = [...data].sort((a, b) => {
                const namaA = (a.nama || a.Nama || "").toString();
                const namaB = (b.nama || b.Nama || "").toString();
                return namaA.localeCompare(namaB);
            });

            dataTerurut.forEach(anggota => {
                const namaTampil = anggota.nama || anggota.Nama || "Tanpa Nama";
                const domisiliTampil = anggota.domisili || anggota.Domisili || "Lokasi tidak diisi";
                
                let sumberFoto = anggota.foto;
                if (!sumberFoto || sumberFoto.length < 20) {
                    sumberFoto = `https://ui-avatars.com/api/?name=${encodeURIComponent(namaTampil)}&background=00e5ff&color=fff`;
                }

                wadahDaftar.innerHTML += `
                    <div class="member-card shadow-sm cursor-pointer" onclick="window.location.href='tambah-anggota.html?id=${anggota.id}'">
                        <img src="${sumberFoto}" class="w-14 h-14 rounded-full object-cover border-2 border-[#00e5ff] mr-4">
                        <div class="flex-1">
                            <h4 class="font-bold text-gray-800 text-md leading-tight">${namaTampil}</h4>
                            <p class="text-xs text-gray-400 mt-1 italic">📍 ${domisiliTampil}</p>
                        </div>
                        <div class="text-gray-300 ml-2">❯</div>
                    </div>`;
            });
        }

        // 3. Fungsi Filter (Penyebab Masalah - Diperbaiki)
        function filterAnggota() {
            const input = document.getElementById('searchInput').value.toLowerCase().trim();
            const dataLengkap = getDaftarDariStorage();
            
            // Perbaikan: Jika input kosong, tampilkan semua tanpa status 'sedangMencari'
            if (!input) {
                renderData(dataLengkap, false);
                return;
            }

            const hasilFilter = dataLengkap.filter(a => {
                // SAKTI: Cek semua kemungkinan nama kolom dan pastikan jadi string
                const namaCari = (a.nama || a.Nama || a.nama_lengkap || "").toString().toLowerCase();
                const domisiliCari = (a.domisili || a.Domisili || "").toString().toLowerCase();
                
                return namaCari.includes(input) || domisiliCari.includes(input);
            });

            renderData(hasilFilter, true);
        }

        async function muatDaftarAnggota() {
            let daftar = getDaftarDariStorage();
            if (daftar.length === 0) {
                await sinkronisasiDataCloud();
                daftar = getDaftarDariStorage();
            }
            renderData(daftar, false);
        }

        async function sinkronisasiDataCloud() {
            try {
                const response = await fetch(URL_API + "?t=" + Date.now());
                const resJson = await response.json();
                if (resJson && resJson.keluarga) {
                    localStorage.setItem('dataCloud', JSON.stringify(resJson));
                }
            } catch (err) { console.error(err); }
        }

        window.onload = muatDaftarAnggota;
    </script>
</body>
</html>
