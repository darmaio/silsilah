<!DOCTYPE html>
<html lang="id">
<head>
    <title>Cari Anggota - Silsilah Mbah Muntari</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4RDDKDQNKB"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-4RDDKDQNKB');
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .header-curve {
            background: linear-gradient(135deg, #00e5ff 0%, #00acc1 100%);
            height: 90px;
            border-bottom-left-radius: 10% 30px;
            border-bottom-right-radius: 10% 30px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .btn-back {
            position: absolute;
            left: 15px;
            top: 35px;
            background: rgba(39, 38, 38, 0.2);
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        .search-container {
            margin-top: 20px;
            padding: 0 24px;
        }
        .search-input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 25px;
            border: 1px solid #e0e0e0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            outline: none;
        }
        .search-input:focus {
            border-color: #00e5ff;
        }
        .member-card {
            display: flex;
            align-items: center;
            padding: 12px;
            background: white;
            border-radius: 15px;
            margin-bottom: 12px;
            border: 1px solid #f0f0f0;
            transition: transform 0.2s;
        }
        .member-card:active {
            transform: scale(0.98);
            background-color: #f9f9f9;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="header-curve">
        <button onclick="window.location.href='index.html'" class="btn-back">←</button>
        <h1 class="text-xl font-bold">Cari Anggota</h1>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" onkeyup="filterAnggota()" placeholder="Cari nama anggota keluarga..." class="search-input">
    </div>

    <div id="wadahDaftar" class="p-6 mt-2">
        </div>

    <script src="config.js"></script> <script>
        // 1. Ambil data dari localStorage
        function getDaftarDariStorage() {
            const dataRaw = localStorage.getItem('dataCloud');
            if (dataRaw) {
                try {
                    const parsed = JSON.parse(dataRaw);
                    return parsed.keluarga || [];
                } catch (e) { return []; }
            }
            return [];
        }

        // 2. Fungsi Render: Tampilkan Kartu
        // Saya tambah parameter 'sedangCari' supaya bisa bedakan pesan error
        function renderData(data, sedangCari = false) {
            const wadahDaftar = document.getElementById('wadahDaftar');
            
            // JIKA DATA TIDAK ADA
            if (!data || data.length === 0) {
                if (sedangCari) {
                    // Jika user lagi ngetik tapi nggak ketemu
                    wadahDaftar.innerHTML = `
                        <div class="text-center mt-12 px-6">
                            <p class="text-gray-400 italic">Nama "${document.getElementById('searchInput').value}" tidak ditemukan...</p>
                        </div>`;
                } else {
                    // Jika baru buka halaman tapi data memang kosong (masalah koneksi/sinkron)
                    wadahDaftar.innerHTML = `
                        <div class="text-center mt-12 px-6">
                            <div class="bg-red-50 p-6 rounded-2xl border-2 border-dashed border-red-200">
                                <p class="text-gray-500 italic">Data keluarga belum sinkron.</p>
                                <button onclick="location.reload()" class="bg-red-500 text-white px-4 py-2 rounded-xl mt-3 text-sm">Sinkron Sekarang</button>
                            </div>
                        </div>`;
                }
                return;
            }

            // JIKA DATA ADA, TAMPILKAN KARTU
            wadahDaftar.innerHTML = ''; 
            const dataTerurut = [...data].sort((a, b) => (a.nama || "").localeCompare(b.nama || ""));

            dataTerurut.forEach(anggota => {
                let sumberFoto = anggota.foto;
                if (!sumberFoto || sumberFoto === "null" || sumberFoto === "" || sumberFoto.length < 20) {
                    sumberFoto = `https://ui-avatars.com/api/?name=${encodeURIComponent(anggota.nama)}&background=00e5ff&color=fff`;
                }

                let infoLahir = (anggota.tempatLahir || anggota.tanggalLahir) 
                    ? `${anggota.tempatLahir || '?'}, ${anggota.tanggalLahir || '?'}`
                    : "Data kelahiran belum diisi";

                wadahDaftar.innerHTML += `
                    <div class="member-card shadow-sm cursor-pointer hover:bg-gray-50 flex items-center p-4 bg-white mb-3 rounded-2xl border border-gray-100" 
                        onclick="window.location.href='tambah-anggota.html?id=${anggota.id}'">
                        <img src="${sumberFoto}" class="w-14 h-14 rounded-full object-cover border-2 border-[#00e5ff] shadow-sm mr-4">
                        <div class="flex-1">
                            <h4 class="font-bold text-gray-800 text-md leading-tight">${anggota.nama}</h4>
                            <p class="text-[10px] text-[#00e5ff] font-semibold mt-0.5 uppercase tracking-wide">${infoLahir}</p>
                            <p class="text-xs text-gray-400 mt-1 italic leading-tight">📍 ${anggota.domisili || 'Lokasi tidak diisi'}</p>
                        </div>
                        <div class="text-gray-300 ml-2">❯</div>
                    </div>`;
            });
        }

        // 3. Fitur Cari (Sudah diperbaiki logikanya)
        function filterAnggota() {
            const input = document.getElementById('searchInput').value.toLowerCase().trim();
            const dataLengkap = getDaftarDariStorage();
            
            // Kalau kotak pencarian kosong, tampilkan semua data aslinya
            if (input === "") {
                renderData(dataLengkap, false);
                return;
            }

            // Filter data berdasarkan Nama atau Domisili
            const hasilFilter = dataLengkap.filter(anggota => {
                const namaAman = (anggota.nama || "").toLowerCase();
                const domisiliAman = (anggota.domisili || "").toLowerCase();
                return namaAman.includes(input) || domisiliAman.includes(input);
            });

            // Jalankan render dengan status 'sedangCari = true'
            renderData(hasilFilter, true);
        }

        async function muatDaftarAnggota() {
            let daftar = getDaftarDariStorage();
            if (daftar.length === 0) {
                await sinkronisasiDataCloud();
                daftar = getDaftarDariStorage();
            }
            renderData(daftar, false);
        }

        async function sinkronisasiDataCloud() {
            try {
                const response = await fetch(URL_API + "?t=" + Date.now());
                const resJson = await response.json();
                if (resJson && resJson.keluarga) {
                    localStorage.setItem('dataCloud', JSON.stringify(resJson));
                }
            } catch (err) { console.error(err); }
        }

        // Jalankan saat halaman dibuka
        window.onload = muatDaftarAnggota;
    </script>
</body>
</html>
